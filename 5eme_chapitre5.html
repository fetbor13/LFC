
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>5ᵉ · Chapitre 5 — Caractériser le mouvement | PhysiChem</title>
<script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]},options:{skipHtmlTags:['script','noscript','style','textarea']}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
/* ── BLOCK 1 : base layout & components ── */
:root{
  --blue:#0f766e;--light:#f0fdfa;--dark:#134e4a;--accent:#0d9488;
  --bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --side:286px;--content:1280px;--rad:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
h2{font-size:1.35rem;font-weight:700;margin-bottom:.75rem}
h3{font-size:1.1rem;font-weight:600;margin-bottom:.5rem;color:var(--dark)}
p{line-height:1.65;margin-bottom:.75rem}

.rail{width:var(--side);min-width:var(--side);background:var(--dark);color:#e2e8f0;
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;
  padding:1.25rem 1rem;gap:.75rem;overflow-y:auto;flex-shrink:0;
  border-right:3px solid var(--accent);}
.brand{display:flex;align-items:center;gap:.65rem;margin-bottom:.25rem}
.brand-mark{background:var(--accent);color:#fff;font-weight:800;font-size:1.05rem;
  width:36px;height:36px;border-radius:var(--rad);display:grid;place-items:center;flex-shrink:0}
.brand h1{font-size:.95rem;font-weight:700;color:#fff;line-height:1.1}
.brand p{font-size:.7rem;color:#94a3b8;margin:0}
.level-card{background:rgba(255,255,255,.07);border-radius:var(--rad);padding:.65rem .75rem}
.level-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.badge{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:.2rem .45rem;border-radius:4px;text-transform:uppercase}
.micro{font-size:.68rem;color:#94a3b8}
.progress{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin:.1rem 0}
.progress span{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.nav-label{font-size:.65rem;font-weight:700;text-transform:uppercase;color:#64748b;letter-spacing:.08em;padding:0 .25rem}
.tablist{display:flex;flex-direction:column;gap:.25rem}
.tab{display:flex;align-items:center;gap:.6rem;background:transparent;border:none;color:#cbd5e1;
  padding:.5rem .65rem;border-radius:var(--rad);cursor:pointer;text-align:left;font-size:.82rem;
  transition:background .18s,color .18s;width:100%}
.tab:hover{background:rgba(255,255,255,.07);color:#fff}
.tab.active{background:var(--accent);color:#fff;font-weight:600}
.tab-icon{font-size:.95rem;flex-shrink:0;width:20px;text-align:center}
.tab-text{flex:1}
.tools{display:flex;gap:.4rem;margin-top:auto;padding-top:.5rem}
.icon-btn{background:rgba(255,255,255,.08);border:none;color:#94a3b8;width:34px;height:34px;
  border-radius:var(--rad);cursor:pointer;display:grid;place-items:center;transition:all .2s}
.icon-btn:hover{background:rgba(255,255,255,.15);color:#fff}

.panels{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.hero{background:var(--dark);padding:2rem;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:0;right:0;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.03));pointer-events:none}
.hero-sub{font-size:.7rem;font-weight:700;color:var(--accent);letter-spacing:.05em;margin-bottom:.5rem;text-transform:uppercase}
.hero-title{font-size:2rem;font-weight:800;margin-bottom:.5rem;line-height:1.2}
.hero-title span{color:#5eead4}
.hero-desc{color:#cbd5e1;font-size:.95rem;max-width:600px;margin-bottom:1.5rem}
.hero-stats{display:flex;gap:1rem}
.stat{background:rgba(255,255,255,.1);padding:.5rem 1rem;border-radius:var(--rad);text-align:center;min-width:80px}
.stat-val{font-size:1.25rem;font-weight:800;color:#fff;line-height:1}
.stat-lbl{font-size:.6rem;font-weight:700;color:#94a3b8;margin-top:.25rem;text-transform:uppercase}

.panel{display:none;padding:2rem;max-width:var(--content);margin:0 auto;width:100%;animation:fade .3s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.pill-nav{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;background:var(--card);
  padding:.75rem;border-radius:var(--rad);border:1px solid var(--border)}
.pill{background:var(--bg);color:var(--text);font-size:.8rem;font-weight:600;
  padding:.4rem .85rem;border-radius:20px;border:1px solid var(--border);transition:all .2s;display:flex;align-items:center;gap:.4rem}
.pill:hover,.pill.active{background:var(--light);color:var(--dark);border-color:var(--accent)}
.pill-num{background:var(--accent);color:#fff;width:18px;height:18px;border-radius:50%;
  display:grid;place-items:center;font-size:.6rem;font-weight:800}

.content-card{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);
  padding:2rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.content-card h2{display:flex;align-items:center;gap:.75rem;padding-bottom:1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.part-num{color:var(--accent);font-weight:800;font-size:1.5rem;display:flex;align-items:center;gap:.5rem}
.part-num::after{content:'';display:block;width:3px;height:24px;background:var(--accent);border-radius:2px}

.box{border-radius:var(--rad);padding:1.25rem;margin:1rem 0;position:relative}
.box-green{background:#ecfdf5;border:1px solid #10b981;border-left:4px solid #10b981}
.box-yellow{background:#fefce8;border:1px solid #eab308;border-left:4px solid #eab308}
.box-purple{background:#faf5ff;border:1px solid #a855f7;border-left:4px solid #a855f7}
.box-label{position:absolute;top:-10px;left:15px;background:#10b981;color:#fff;
  font-size:.65rem;font-weight:800;padding:.2rem .5rem;border-radius:4px;letter-spacing:.05em}

.method-acc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);margin:1rem 0;overflow:hidden}
.method-acc summary{background:var(--card);padding:.85rem 1.25rem;font-weight:600;font-size:.9rem;
  cursor:pointer;display:flex;align-items:center;gap:.5rem;user-select:none}
.method-acc summary::before{content:'▶';font-size:.7rem;color:var(--accent);transition:transform .2s}
.method-acc[open] summary::before{transform:rotate(90deg)}
.method-acc-content{padding:1.25rem;border-top:1px solid var(--border)}

.data-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.85rem}
.data-table th{background:var(--dark);color:#fff;text-align:left;padding:.75rem;font-weight:600}
.data-table td{padding:.75rem;border-bottom:1px solid var(--border);background:var(--card)}
.data-table tr:nth-child(even) td{background:var(--bg)}

.step-list{list-style:none;counter-reset:step}
.step-list li{position:relative;padding-left:2.5rem;margin-bottom:1rem}
.step-list li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:-2px;
  width:24px;height:24px;background:var(--accent);color:#fff;border-radius:50%;
  display:grid;place-items:center;font-size:.75rem;font-weight:700}

/* Utilitaires */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.center{text-align:center}
.math-block{background:var(--bg);padding:1rem;border-radius:var(--rad);text-align:center;margin:1rem 0;overflow-x:auto}
@media (max-width:1024px){.rail{width:240px;min-width:240px}}
@media (max-width:768px){body{flex-direction:column}.rail{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- RAIL LATÉRAL -->
<div class="rail">
  <div class="brand">
    <div class="brand-mark">P</div>
    <div>
      <h1>PhysiChem</h1>
      <p>M Borsali · Enseignant SPC</p>
    </div>
  </div>

  <div class="level-card">
    <div class="level-row">
      <span class="badge">5ᵉ</span>
      <span class="micro">Chap. 5</span>
    </div>
    <div class="progress"><span style="width:100%"></span></div>
    <div class="micro" style="margin-top:.2rem">100% du chapitre exploré</div>
  </div>

  <div class="nav-label" style="margin-top:1rem">SOMMAIRE</div>
  <div class="tablist">
  </div>

  <div class="tools">
    <button class="icon-btn" title="Mode sombre (démo)">🌙</button>
    <button class="icon-btn" title="Imprimer">🖨️</button>
    <button class="icon-btn" title="Plein écran">⛶</button>
  </div>
</div>

<!-- CONTENU PRINCIPAL -->
<div class="panels">

  <!-- EN-TÊTE COMMUN -->
  <div class="hero">
    <div class="hero-sub">5ᵉ · Chap. 5</div>
    <h1 class="hero-title">Caractériser le mo<span>uvement | PhysiChem</span></h1>
    <p class="hero-desc">Explorez les concepts fondamentaux de ce chapitre.</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-val">?</div><div class="stat-lbl">NOTIONS</div></div>
      <div class="stat"><div class="stat-val">?</div><div class="stat-lbl">EXERCICES</div></div>
    </div>
  </div>

</div>

<script>
// Gestion des onglets
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    btn.classList.add('active');
    const targetId = btn.getAttribute('data-target');
    const targetPanel = document.getElementById(targetId);
    if(targetPanel) targetPanel.classList.add('active');
  });
});
</script>
</body>
</html>
