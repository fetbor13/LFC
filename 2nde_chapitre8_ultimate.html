    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    margin-top: 24px;
}
.fc-card {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    height: 220px;
    perspective: 1000px;
    cursor: pointer;
}
.fc-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
}
.fc-card.flipped .fc-inner {
    transform: rotateY(180deg);
}
.fc-front, .fc-back {
    position: absolute;
    inset: 0;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.fc-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, rgba(var(--active-rgb), 0.1), rgba(0,0,0,0.4));
    border-color: rgba(var(--active-rgb), 0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(var(--active-rgb), 0.15);
}
.fc-front strong { font-size: 1.2rem; color: var(--ink); }
.fc-front p { font-size: 0.9rem; color: var(--muted); margin-top: 8px;}
.fc-back p { font-size: 1.1rem; color: var(--ink); font-weight: 500; }

/* Magnetic hover effect for cards */
.fc-card:hover .fc-inner {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 15px 35px rgba(var(--active-rgb), 0.15);
}
.fc-card.flipped:hover .fc-inner {
    transform: rotateY(180deg) translateY(-5px) scale(1.02);
}

/* --- 2. CHATBOT COPILOT UI --- */
.ai-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.2)) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 24px !important;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4) !important;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.ai-header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.2);
}
.ai-header-icon {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(var(--active-rgb), 0.2);
    border: 1px solid var(--active);
    display: grid; place-items: center;
    color: var(--active); font-weight: bold;
    box-shadow: 0 0 15px rgba(var(--active-rgb), 0.4);
}
.chat-window {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 400px;
    overflow-y: auto;
}
.chat-msg {
    padding: 12px 18px;
    border-radius: 18px;
    max-width: 85%;
    font-size: 0.95rem;
    line-height: 1.5;
    animation: fadeUp 0.3s ease-out;
}
.msg-user {
    align-self: flex-end;
    background: rgba(255,255,255,0.08);
    border-bottom-right-radius: 4px;
    color: var(--ink);
}
.msg-ai {
    align-self: flex-start;
    background: linear-gradient(135deg, rgba(var(--active-rgb), 0.15), rgba(var(--active-rgb), 0.05));
    border: 1px solid rgba(var(--active-rgb), 0.3);
    border-bottom-left-radius: 4px;
    color: var(--soft);
    box-shadow: 0 4px 15px rgba(var(--active-rgb), 0.1);
}
.ai-input-area {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.3);
}
.chat-textarea {
    width: 100%;
    background: rgba(255,255,255,0.03) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 12px !important;
    padding: 12px 16px !important;
    color: var(--ink) !important;
    font-family: inherit;
    resize: none;
    transition: all 0.2s;
}
.chat-textarea:focus {
    border-color: var(--active) !important;
    box-shadow: 0 0 10px rgba(var(--active-rgb), 0.2) !important;
    outline: none;
}
.sug-chip {
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: var(--muted) !important;
    border-radius: 99px !important;
    padding: 6px 14px !important;
    font-size: 0.8rem !important;
    transition: all 0.2s !important;
}
.sug-chip:hover {
    background: rgba(var(--active-rgb), 0.15) !important;
    color: var(--active) !important;
    border-color: var(--active) !important;
}

/* --- 3. SIMULATION/CANVAS UPGRADES --- */
.sim-card, .canvas-box, .titrage-grid {
    background: rgba(0,0,0,0.3) !important;
    border: 1px solid rgba(var(--active-rgb), 0.2) !important;
    border-radius: 20px !important;
    overflow: hidden;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.3) !important;
}
.sim-card input[type="range"] {
    accent-color: var(--active);
}

@keyframes typing {
  0%, 100% { opacity: 0.3; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-3px); }
}
.typing-indicator span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--active);
    border-radius: 50%;
    margin: 0 2px;
    animation: typing 1s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
</style>

</head>
<body>
<canvas id="starfield"></canvas>
<div class="shell" id="app">
  <header class="topbar" style="border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 16px;">
    <div class="brand"><div class="brand-mark">EA</div><div><small>Lycée Français du Caire · M. Borsali</small><strong>Seconde · Chapitre</strong></div></div>
    <div class="top-actions">
      <button class="ghost-btn" type="button" onclick="window.location.href='index_cercle_2026.html'">Retour à l'accueil</button>
    </div>
  </header>
  <div class="workspace">
    <aside class="side">
      <div class="side-title"><small>Navigation du chapitre</small><strong>Sommaire</strong></div>
      <nav aria-label="Onglets du chapitre" class="tablist" role="tablist">

<button class="tab active" data-tab="cours" role="tab"><span class="tab-icon">📘</span><span class="tab-text">Cours</span></button>
<button class="tab" data-tab="outils" role="tab"><span class="tab-icon">∑</span><span class="tab-text">Relations § Dimensions</span></button>
<button class="tab" data-tab="exercices" role="tab"><span class="tab-icon">🎯</span><span class="tab-text">Exercices</span></button>
<button class="tab" data-tab="flashcards" role="tab"><span class="tab-icon">🃏</span><span class="tab-text">Flashcards</span></button>
<button class="tab" data-tab="mindmap" role="tab"><span class="tab-icon">🧠</span><span class="tab-text">Carte mentale</span></button>
<button class="tab" data-tab="simulations" role="tab"><span class="tab-icon">🎛️</span><span class="tab-text">Simulations</span></button>
<button class="tab" data-tab="quiz" role="tab"><span class="tab-icon">✅</span><span class="tab-text">Quiz § Chatbot</span></button>
<button class="tab" data-tab="ece" role="tab"><span class="tab-icon">🧪</span><span class="tab-text">ECE</span></button>
<button class="tab" data-tab="prepa" role="tab"><span class="tab-icon">🎓</span><span class="tab-text">Vers prépa PCSI</span></button>

      </nav>
    </aside>
    <main class="main panel" id="main">

    </main>
  </div>
</div>
<script>

(function(){
  function _scrollToPanel(){
    var p=document.querySelector('.panel.active');
    if(!p)return;
    var nb=document.querySelector('.topbar,.top-nav,.nav-bar,header');
    var off=nb?nb.offsetHeight+6:70;
    var y=p.getBoundingClientRect().top+window.scrollY-off;
    window.scrollTo({top:Math.max(0,y),behavior:'smooth'});
  }
  document.addEventListener('click',function(e){
    var b=e.target.closest('.tab,[data-tab],[data-t],button[onclick]');
    if(b)setTimeout(_scrollToPanel,60);
  },true);
})();


// 2026 Ultimate Aesthetics (Canvas)
const canvas=document.getElementById('starfield');
if(canvas){
    const ctx=canvas.getContext('2d');
    let w=canvas.width=window.innerWidth;
    let h=canvas.height=window.innerHeight;
    const stars=Array.from({length:250},()=>({x:Math.random()*w,y:Math.random()*h,s:Math.random()*1.5,a:Math.random()}));
    function draw(){
      ctx.clearRect(0,0,w,h);
      stars.forEach(st=>{
        st.a+=0.02;
        ctx.fillStyle=`rgba(255,255,255,${Math.abs(Math.sin(st.a))*0.5+0.1})`;
        ctx.beginPath(); ctx.arc(st.x,st.y,st.s,0,Math.PI*2); ctx.fill();
        st.y-=0.2; if(st.y<0) st.y=h;
      });
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize',()=>{w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;});
}

// Ensure tab switching updates the 2026 sidebar
const originalSwitchTab = window.switchTab;
if (typeof originalSwitchTab === 'function') {
    window.switchTab = function(tabId) {
        originalSwitchTab(tabId);
        document.querySelectorAll('.tablist .tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tablist .tab[data-tab="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');
    };
} else {
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tablist .tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tablist .tab[data-tab="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');

        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const targetPanel = document.getElementById('tab-' + tabId);
        if(targetPanel) targetPanel.classList.add('active');
    }
}

document.querySelectorAll('.tablist .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (typeof window.switchTab === 'function') {
        window.switchTab(btn.dataset.tab);
    }
  });
});

</script>
