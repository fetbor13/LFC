<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Supérieure: Balistique avec Frottements & Énergies</title>
    <style>
        :root {
            --bg-color: #030712;
            --text-color: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #f59e0b;
            --accent-glow: 0 0 15px rgba(245, 158, 11, 0.6);
            --panel-bg: rgba(0,0,0,0.6);
            --traj-color: #2dd4bf;
            --ec-color: #3b82f6; /* Blue for Kinetic Energy */
            --ep-color: #10b981; /* Green for Potential Energy */
            --em-color: #ef4444; /* Red for Mechanical Energy */
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.2);
            --accent-color: #d97706;
            --accent-glow: 0 0 15px rgba(217, 119, 6, 0.4);
            --panel-bg: rgba(255,255,255,0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; display: flex; height: 100vh; width: 100vw; transition: background-color 0.3s, color 0.3s; }
        #app-container { display: flex; width: 100%; height: 100%; }

        #visual-pane { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .section-box { background: var(--panel-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; position: relative; display: flex; flex-direction: column; }
        .section-title { position: absolute; top: 12px; left: 15px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); opacity: 0.8; z-index: 10; }

        #scene-section { flex: 2; display: flex; justify-content: center; align-items: center; }
        #graph-section { height: 250px; display: flex; justify-content: center; align-items: center; background: #000; border-radius: 8px; overflow: hidden; }

        canvas { display: block; width: 100%; height: 100%; }

        #controls-pane { width: 380px; background: var(--glass-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; }
        h2 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 5px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; display: flex; justify-content: space-between; font-weight: 500; color: var(--text-muted); }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--text-color); cursor: pointer; margin-top: -5px; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: var(--glass-border); border-radius: 1px; }

        .stats-box { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); font-family: 'Fira Code', monospace; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px; }
        .math-eq { font-style: italic; color: #10b981; font-weight: bold; }
        #theme-toggle { position: absolute; top: 15px; right: 15px; z-index: 20; background: var(--glass-bg); backdrop-filter: blur(5px); border: 1px solid var(--glass-border); color: var(--text-color); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        .btn-group { display: flex; gap: 8px; }
        button.action-btn { flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px;}
        button.action-btn:hover { background: rgba(255,255,255,0.1); }
        .btn-play { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color) !important; box-shadow: var(--accent-glow); }
        .btn-play:hover { filter: brightness(1.1); }
        .btn-danger { color: #ef4444 !important; border-color: rgba(239,68,68,0.3) !important; }
        .btn-danger:hover { background: rgba(239,68,68,0.1) !important; }

        .switch-container { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; font-weight: 500; }
        input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent-color); cursor: pointer; }
    </style>
</head>
<body>

    <button id="theme-toggle">Thème</button>

    <div id="app-container">
        <div id="visual-pane">
            <div id="scene-section" class="section-box">
                <div class="section-title">Espace Balistique</div>
                <div style="flex:1; position:relative; width:100%; height:100%;">
                    <canvas id="simCanvas"></canvas>
                </div>
            </div>

            <div id="graph-section" class="section-box" style="padding:0; border:4px solid #1e293b;">
                <div class="section-title" style="top:15px; left:20px; z-index:20;">Bilan Énergétique</div>
                <div style="flex:1; position:relative; width:100%; height:100%;">
                    <canvas id="graphCanvas"></canvas>
                </div>
            </div>
        </div>

        <div id="controls-pane">
            <h2>Balistique Avancée</h2>
            <div style="text-align:center; font-size:0.8rem; color:gray; margin-top:-10px; margin-bottom:10px;">Frottements & Bilan d'Énergies</div>

            <div class="control-group">
                <label>Vitesse initiale ($v_0$) <span id="v0-val">20.0 m/s</span></label>
                <input type="range" id="v0" min="5" max="50" step="0.5" value="20">
            </div>

            <div class="control-group">
                <label>Angle de tir ($\alpha$) <span id="angle-val">45.0°</span></label>
                <input type="range" id="angle" min="0" max="90" step="0.5" value="45">
            </div>

            <div class="control-group">
                <label>Masse ($m$) <span id="m-val">1.0 kg</span></label>
                <input type="range" id="mass" min="0.1" max="10" step="0.1" value="1.0">
            </div>

            <div style="height: 1px; background: var(--glass-border); margin: 5px 0;"></div>

            <div class="control-group">
                <div class="switch-container">
                    <label style="color:#f59e0b;">Activer Frottements de l'air</label>
                    <input type="checkbox" id="enable-drag">
                </div>
                <div id="drag-controls" style="display:none; margin-top:5px;">
                    <label>Coef. de Traînée ($C_x \cdot S$) <span id="cx-val">0.05 m²</span></label>
                    <input type="range" id="cx" min="0.01" max="0.2" step="0.01" value="0.05">
                </div>
            </div>

            <div class="stats-box">
                <div class="math-eq" id="eq-main">$\sum \vec{F} = m\vec{g} - \frac{1}{2}\rho S C_x v \vec{v}$</div>
                <hr style="border-color: var(--glass-border); margin: 5px 0;">
                <div style="display:flex; justify-content:space-between;"><span>$t$:</span> <span id="stat-t" style="color:#fbbf24; font-weight:bold;">0.000 s</span></div>
                <div style="display:flex; justify-content:space-between;"><span>$x(t)$:</span> <span id="stat-x">0.000 m</span></div>
                <div style="display:flex; justify-content:space-between;"><span>$y(t)$:</span> <span id="stat-y">0.000 m</span></div>
                <div style="display:flex; justify-content:space-between;"><span>$v(t)$:</span> <span id="stat-v">0.000 m/s</span></div>
            </div>

            <!-- Playback Controls -->
            <div class="btn-group" style="margin-top:auto;">
                <button id="btn-play" class="action-btn btn-play" style="flex:2;">▶ Démarrer</button>
                <button id="btn-step" class="action-btn">⏐▶ Pas</button>
                <button id="btn-reset" class="action-btn btn-danger">RAZ</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');
        const themeToggle = document.getElementById('theme-toggle');

        const v0Input = document.getElementById('v0');
        const angleInput = document.getElementById('angle');
        const massInput = document.getElementById('mass');
        const enableDrag = document.getElementById('enable-drag');
        const cxInput = document.getElementById('cx');
        const dragControls = document.getElementById('drag-controls');

        const statT = document.getElementById('stat-t');
        const statX = document.getElementById('stat-x');
        const statY = document.getElementById('stat-y');
        const statV = document.getElementById('stat-v');

        const btnPlay = document.getElementById('btn-play');
        const btnStep = document.getElementById('btn-step');
        const btnReset = document.getElementById('btn-reset');

        let dpr = window.devicePixelRatio || 1;
        let cWidth, cHeight, gWidth, gHeight;

        // Physics constants
        const g = 9.81;
        const rho_air = 1.225; // kg/m^3

        // State
        let isRunning = false;
        let p = null; // Single projectile instance
        let lastTime = 0;

        function resize() {
            cWidth = canvas.parentElement.clientWidth;
            cHeight = canvas.parentElement.clientHeight;
            canvas.width = cWidth * dpr;
            canvas.height = cHeight * dpr;
            ctx.scale(dpr, dpr);

            gWidth = graphCanvas.parentElement.clientWidth;
            gHeight = graphCanvas.parentElement.clientHeight;
            graphCanvas.width = gWidth * dpr;
            graphCanvas.height = gHeight * dpr;
            gCtx.scale(dpr, dpr);

            if(p) {
                p.originY = cHeight - 40;
                drawStatic();
            } else {
                resetSim();
            }
        }
        window.addEventListener('resize', resize);

        themeToggle.addEventListener('click', () => {
            document.documentElement.setAttribute('data-theme',
                document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            );
            drawStatic();
        });

        enableDrag.addEventListener('change', (e) => {
            dragControls.style.display = e.target.checked ? 'block' : 'none';
            if(!isRunning && p && p.t === 0) resetSim();
        });

        function updateLabels() {
            document.getElementById('v0-val').textContent = parseFloat(v0Input.value).toFixed(1) + ' m/s';
            document.getElementById('angle-val').textContent = parseFloat(angleInput.value).toFixed(1) + '°';
            document.getElementById('m-val').textContent = parseFloat(massInput.value).toFixed(1) + ' kg';
            document.getElementById('cx-val').textContent = parseFloat(cxInput.value).toFixed(2) + ' m²';
            if(!isRunning && p && p.t === 0) resetSim();
        }

        v0Input.addEventListener('input', updateLabels);
        angleInput.addEventListener('input', updateLabels);
        massInput.addEventListener('input', updateLabels);
        cxInput.addEventListener('input', updateLabels);

        class Projectile {
            constructor() {
                this.v0 = parseFloat(v0Input.value);
                this.angle = parseFloat(angleInput.value) * Math.PI / 180;
                this.m = parseFloat(massInput.value);
                this.hasDrag = enableDrag.checked;
                this.cx_s = parseFloat(cxInput.value);

                this.t = 0;
                this.x = 0;
                this.y = 0;
                this.vx = this.v0 * Math.cos(this.angle);
                this.vy = this.v0 * Math.sin(this.angle);

                this.active = true;
                this.path = [];
                this.energies = []; // {t, ec, ep, em}

                this.scaleX = 15; // px/m
                this.scaleY = 15;
                this.originX = 40;
                this.originY = cHeight - 40;
            }

            update(dt) {
                if (!this.active) return;

                // High precision Euler
                let steps = 20;
                let dts = dt / steps;

                for(let i=0; i<steps; i++) {
                    let v_mag = Math.sqrt(this.vx*this.vx + this.vy*this.vy);

                    let ax = 0;
                    let ay = -g;

                    if (this.hasDrag) {
                        // F_frot = -0.5 * rho * S * Cx * v * vec(v)
                        let f_drag = 0.5 * rho_air * this.cx_s * v_mag;
                        ax -= (f_drag * this.vx) / this.m;
                        ay -= (f_drag * this.vy) / this.m;
                    }

                    this.vx += ax * dts;
                    this.vy += ay * dts;
                    this.x += this.vx * dts;
                    this.y += this.vy * dts;
                    this.t += dts;

                    if (this.y < 0) {
                        this.y = 0;
                        this.vy = 0;
                        this.vx = 0;
                        this.active = false;
                        break;
                    }
                }

                let screenX = this.originX + this.x * this.scaleX;
                let screenY = this.originY - this.y * this.scaleY;

                if (this.path.length === 0 || this.t - this.energies[this.energies.length-1].t > 0.05) {
                    this.path.push({x: screenX, y: screenY});

                    // Energies
                    let v2 = this.vx*this.vx + this.vy*this.vy;
                    let ec = 0.5 * this.m * v2;
                    let ep = this.m * g * this.y;
                    let em = ec + ep;
                    this.energies.push({t: this.t, ec: ec, ep: ep, em: em});
                }
            }

            draw(ctx) {
                if (this.path.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.path[0].x, this.path[0].y);
                    for (let i = 1; i < this.path.length; i++) ctx.lineTo(this.path[i].x, this.path[i].y);
                    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--traj-color').trim();
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                if (this.path.length > 0) {
                    let lastPos = this.path[this.path.length - 1];
                    ctx.beginPath(); ctx.arc(lastPos.x, lastPos.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#f59e0b'; ctx.fill();

                    // Vectors
                    if (this.active) {
                        let vScale = 2.0;
                        drawArrow(ctx, lastPos.x, lastPos.y, lastPos.x + this.vx * vScale, lastPos.y - this.vy * vScale, '#10b981', 2.5);
                    }
                }
            }
        }

        function drawArrow(ctx, fromX, fromY, toX, toY, color, lineWidth = 2.5) {
            const headlen = 12;
            const dx = toX - fromX; const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY);
            ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI/6), toY - headlen * Math.sin(angle - Math.PI/6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI/6), toY - headlen * Math.sin(angle + Math.PI/6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color; ctx.fill();
        }

        function drawStatic() {
            if(!cWidth) return;
            ctx.clearRect(0, 0, cWidth, cHeight);

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            // Ground
            ctx.beginPath(); ctx.moveTo(0, cHeight - 40); ctx.lineTo(cWidth, cHeight - 40);
            ctx.strokeStyle = isDark ? '#fff' : '#000'; ctx.lineWidth = 2; ctx.stroke();

            // Grid
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let x=40; x<cWidth; x+=15*5) { ctx.moveTo(x, 0); ctx.lineTo(x, cHeight-40); }
            for(let y=cHeight-40; y>0; y-=15*5) { ctx.moveTo(0, y); ctx.lineTo(cWidth, y); }
            ctx.stroke();

            // Gun
            let angle = parseFloat(angleInput.value) * Math.PI / 180;
            ctx.save();
            ctx.translate(40, cHeight - 40);
            ctx.rotate(-angle);
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath(); ctx.roundRect(-5, -6, 30, 12, 4); ctx.fill();
            ctx.restore();

            if(p) p.draw(ctx);
            drawGraph();
        }

        function drawGraph() {
            gCtx.clearRect(0, 0, gWidth, gHeight);
            if (!p || p.energies.length === 0) return;

            // Graticules
            gCtx.strokeStyle = 'rgba(255,255,255,0.1)';
            gCtx.lineWidth = 1;
            gCtx.beginPath();
            for(let i=1; i<5; i++) {
                gCtx.moveTo(0, i*gHeight/5); gCtx.lineTo(gWidth, i*gHeight/5);
            }
            gCtx.stroke();

            // Find Max E for scaling
            let maxE = 0;
            // The initial Mechanical Energy is usually max, but with drag it decreases. Without drag it's constant.
            if (p.energies.length > 0) maxE = p.energies[0].em * 1.2;
            if (maxE === 0) maxE = 100;

            // Time scale (max 5 seconds or current t)
            let tMax = Math.max(5.0, p.t);

            const ecCol = getComputedStyle(document.documentElement).getPropertyValue('--ec-color').trim();
            const epCol = getComputedStyle(document.documentElement).getPropertyValue('--ep-color').trim();
            const emCol = getComputedStyle(document.documentElement).getPropertyValue('--em-color').trim();

            function plotLine(key, color) {
                gCtx.beginPath();
                gCtx.strokeStyle = color;
                gCtx.lineWidth = 2;
                for(let i=0; i<p.energies.length; i++) {
                    let pt = p.energies[i];
                    let x = (pt.t / tMax) * gWidth;
                    let y = gHeight - (pt[key] / maxE) * gHeight;
                    if(i===0) gCtx.moveTo(x, y);
                    else gCtx.lineTo(x, y);
                }
                gCtx.stroke();
            }

            plotLine('em', emCol);
            plotLine('ec', ecCol);
            plotLine('ep', epCol);

            // Legend
            gCtx.fillStyle = '#fff'; gCtx.font = '12px "Fira Code", monospace';
            gCtx.textAlign = 'left';
            gCtx.fillText(`Em`, 10, 20); gCtx.fillStyle = emCol; gCtx.fillRect(35, 10, 10, 10);
            gCtx.fillStyle = '#fff'; gCtx.fillText(`Ec`, 60, 20); gCtx.fillStyle = ecCol; gCtx.fillRect(85, 10, 10, 10);
            gCtx.fillStyle = '#fff'; gCtx.fillText(`Ep`, 110, 20); gCtx.fillStyle = epCol; gCtx.fillRect(135, 10, 10, 10);
        }

        function resetSim() {
            p = new Projectile();
            isRunning = false;
            btnPlay.textContent = "▶ Démarrer";
            btnPlay.classList.remove('btn-danger');
            lastTime = 0;

            statT.textContent = "0.000 s";
            statX.textContent = "0.000 m";
            statY.textContent = "0.000 m";
            statV.textContent = "0.000 m/s";

            drawStatic();
        }

        btnPlay.addEventListener('click', () => {
            if (!p || !p.active) resetSim();
            isRunning = !isRunning;
            if (isRunning) {
                btnPlay.innerHTML = "⏸ Pause";
                btnPlay.classList.add('btn-danger');
                lastTime = 0;
                requestAnimationFrame(loop);
            } else {
                btnPlay.innerHTML = "▶ Reprendre";
                btnPlay.classList.remove('btn-danger');
            }
        });

        btnStep.addEventListener('click', () => {
            if (!p) resetSim();
            if (isRunning) {
                isRunning = false;
                btnPlay.innerHTML = "▶ Reprendre";
                btnPlay.classList.remove('btn-danger');
            }
            if (p.active) {
                p.update(0.05); // 50ms step
                updateUIStats();
                drawStatic();
            }
        });

        btnReset.addEventListener('click', resetSim);

        function updateUIStats() {
            statT.textContent = p.t.toFixed(3) + ' s';
            statX.textContent = p.x.toFixed(3) + ' m';
            statY.textContent = p.y.toFixed(3) + ' m';
            let v = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
            statV.textContent = v.toFixed(3) + ' m/s';
        }

        function loop(timestamp) {
            if(!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (isRunning && p && p.active) {
                p.update(dt);
                updateUIStats();
                drawStatic();

                if(!p.active) {
                    isRunning = false;
                    btnPlay.innerHTML = "⟳ Rejouer";
                    btnPlay.classList.remove('btn-danger');
                }
            }

            if (isRunning) {
                requestAnimationFrame(loop);
            }
        }

        updateLabels();
        resize();

        // Inject MathJax
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
        script.async = true;
        document.head.appendChild(script);

    </script>
</body>
</html>
