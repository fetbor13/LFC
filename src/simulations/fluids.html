<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation: Mécanique des Fluides & Effet Venturi</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #0ea5e9;
            --accent-glow: 0 0 15px rgba(14, 165, 233, 0.6);
            --fluid-color: rgba(56, 189, 248, 0.4);
            --particle-color: #ffffff;
            --panel-bg: rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.15);
            --accent-color: #0284c7;
            --accent-glow: 0 0 15px rgba(2, 132, 199, 0.4);
            --fluid-color: rgba(14, 165, 233, 0.3);
            --particle-color: #0284c7;
            --panel-bg: rgba(255,255,255,0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; display: flex; height: 100vh; width: 100vw; transition: background-color 0.3s, color 0.3s; }
        #app-container { display: flex; width: 100%; height: 100%; }
        #canvas-container { flex-grow: 1; position: relative; background-image: radial-gradient(var(--glass-border) 1px, transparent 1px); background-size: 30px 30px; }
        canvas { display: block; width: 100%; height: 100%; }
        #controls-pane { width: 360px; background: var(--glass-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; }
        h2 { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); text-shadow: var(--accent-glow); text-align: center; margin-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 10px; background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); }
        label { font-size: 0.9rem; display: flex; justify-content: space-between; font-weight: 600; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-color); cursor: pointer; margin-top: -6px; box-shadow: var(--accent-glow); }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(128, 128, 128, 0.4); border-radius: 2px; }
        .stats-box { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); font-family: monospace; font-size: 0.95rem; display: flex; flex-direction: column; gap: 8px; }
        .math-eq { font-style: italic; color: #10b981; text-align: center; margin: 5px 0; font-weight: bold; }
        #theme-toggle { position: absolute; top: 15px; left: 15px; z-index: 20; background: var(--glass-bg); backdrop-filter: blur(5px); border: 1px solid var(--glass-border); color: var(--text-color); padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button id="theme-toggle">Thème</button>

    <div id="app-container">
        <div id="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>

        <div id="controls-pane">
            <h2>Mécanique des Fluides</h2>
            <div style="text-align:center; font-size:0.8rem; color:gray; margin-top:-10px; margin-bottom:10px;">Tube de Venturi & Bernoulli</div>

            <div class="control-group">
                <label>Vitesse Initiale (v₁) <span id="v1-val">2.0 m/s</span></label>
                <input type="range" id="v1-input" min="0.5" max="5.0" step="0.1" value="2.0">
            </div>

            <div class="control-group">
                <label>Section Normale (S₁) <span id="s1-val">1.0 m²</span></label>
                <input type="range" id="s1-input" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <label>Section Étranglement (S₂) <span id="s2-val">0.5 m²</span></label>
                <input type="range" id="s2-input" min="0.1" max="1.5" step="0.1" value="0.5">
            </div>

            <div class="control-group">
                <label>Densité (ρ) <span id="rho-val">1000 kg/m³</span></label>
                <input type="range" id="rho-input" min="1" max="1500" step="10" value="1000">
            </div>

            <div class="stats-box">
                <div class="math-eq">S₁·v₁ = S₂·v₂ (Continuité)</div>
                <div class="math-eq" style="font-size:0.85rem;">P₁ + ½ρv₁² = P₂ + ½ρv₂² (Bernoulli)</div>
                <hr style="border-color: var(--glass-border); margin: 5px 0;">
                <div style="color:#fbbf24;">Point 1 (Normale):</div>
                <div>v₁ = <span id="stat-v1">2.00</span> m/s</div>
                <div>P₁ = 100.00 kPa (Réf)</div>
                <hr style="border-color: var(--glass-border); margin: 5px 0;">
                <div style="color:#f43f5e;">Point 2 (Venturi):</div>
                <div>v₂ = <span id="stat-v2">4.00</span> m/s</div>
                <div>P₂ = <span id="stat-p2">94.00</span> kPa</div>
                <div style="color:#38bdf8; font-weight:bold; margin-top:5px;">ΔP = <span id="stat-dp">-6.00</span> kPa</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const themeToggle = document.getElementById('theme-toggle');

        const v1Input = document.getElementById('v1-input');
        const s1Input = document.getElementById('s1-input');
        const s2Input = document.getElementById('s2-input');
        const rhoInput = document.getElementById('rho-input');

        let v1 = 2.0, s1 = 1.0, s2 = 0.5, rho = 1000;
        let v2 = 4.0, P1 = 100000, P2 = 94000;

        let width, height;
        let particles = [];

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }
        window.addEventListener('resize', resize);

        themeToggle.addEventListener('click', () => {
            document.documentElement.setAttribute('data-theme',
                document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            );
        });

        function updatePhysics() {
            v1 = parseFloat(v1Input.value);
            s1 = parseFloat(s1Input.value);
            s2 = parseFloat(s2Input.value);
            rho = parseFloat(rhoInput.value);

            document.getElementById('v1-val').textContent = v1.toFixed(1) + ' m/s';
            document.getElementById('s1-val').textContent = s1.toFixed(1) + ' m²';
            document.getElementById('s2-val').textContent = s2.toFixed(1) + ' m²';
            document.getElementById('rho-val').textContent = rho + ' kg/m³';

            // Continuity equation
            v2 = (s1 * v1) / s2;

            // Bernoulli equation (assuming horizontal, z1=z2)
            // P1 + 0.5*rho*v1^2 = P2 + 0.5*rho*v2^2
            P2 = P1 + 0.5 * rho * (v1*v1 - v2*v2);
            let dP = P2 - P1;

            document.getElementById('stat-v1').textContent = v1.toFixed(2);
            document.getElementById('stat-v2').textContent = v2.toFixed(2);
            document.getElementById('stat-p2').textContent = (P2 / 1000).toFixed(2);
            document.getElementById('stat-dp').textContent = (dP / 1000).toFixed(2);
        }

        v1Input.addEventListener('input', updatePhysics);
        s1Input.addEventListener('input', updatePhysics);
        s2Input.addEventListener('input', updatePhysics);
        rhoInput.addEventListener('input', updatePhysics);

        class Particle {
            constructor() {
                this.reset();
                this.x = Math.random() * width; // distribute randomly at start
            }
            reset() {
                this.x = 0;
                // Random Y within pipe profile
                this.normY = Math.random() * 2 - 1; // -1 to +1
            }
            update(dt) {
                // Determine tube profile at current x
                let cx = width / 2;
                let isVenturi = Math.abs(this.x - cx) < 150;
                let currentV = v1;

                // Very simple approximation of velocity field
                if (this.x > cx - 150 && this.x < cx + 150) {
                    // transition
                    let distToCenter = Math.abs(this.x - cx);
                    let ratio = 1 - (distToCenter / 150); // 1 at center, 0 at edge
                    currentV = v1 + (v2 - v1) * ratio;
                }

                // Move
                // Map visual speed
                this.x += currentV * dt * 50;

                if (this.x > width) this.reset();
            }
            draw() {
                let cx = width / 2;
                let currentS = s1;
                if (this.x > cx - 150 && this.x < cx + 150) {
                    let distToCenter = Math.abs(this.x - cx);
                    let ratio = 1 - (distToCenter / 150);
                    currentS = s1 + (s2 - s1) * ratio;
                }

                let pipeRadius = currentS * 50; // Visual scaling
                let cy = height / 2;
                let y = cy + this.normY * pipeRadius * 0.9; // 0.9 to stay inside borders

                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim();
                ctx.beginPath();
                ctx.arc(this.x, y, 2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 300; i++) particles.push(new Particle());
        }

        function drawPipe() {
            let cx = width / 2;
            let cy = height / 2;

            // Draw Pipe shape
            ctx.beginPath();
            let ptsTop = [], ptsBot = [];

            for (let x = 0; x <= width; x += 10) {
                let currentS = s1;
                if (x > cx - 150 && x < cx + 150) {
                    // Smooth transition using cosine
                    let normX = (x - (cx - 150)) / 300; // 0 to 1
                    let blend = (1 - Math.cos(normX * Math.PI*2)) / 2; // 0 at edges, 1 at center
                    currentS = s1 + (s2 - s1) * blend;
                }
                let rad = currentS * 50;
                ptsTop.push({x: x, y: cy - rad});
                ptsBot.push({x: x, y: cy + rad});
            }

            ctx.moveTo(0, 0);
            ctx.lineTo(0, ptsTop[0].y);
            for(let p of ptsTop) ctx.lineTo(p.x, p.y);
            ctx.lineTo(width, 0);

            ctx.moveTo(0, height);
            ctx.lineTo(0, ptsBot[0].y);
            for(let p of ptsBot) ctx.lineTo(p.x, p.y);
            ctx.lineTo(width, height);

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? '#1e293b' : '#cbd5e1';
            ctx.fill();

            // Outline
            ctx.beginPath();
            ctx.moveTo(ptsTop[0].x, ptsTop[0].y);
            for(let p of ptsTop) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = isDark ? '#fff' : '#000';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(ptsBot[0].x, ptsBot[0].y);
            for(let p of ptsBot) ctx.lineTo(p.x, p.y);
            ctx.stroke();

            // Fluid fill
            ctx.beginPath();
            ctx.moveTo(ptsTop[0].x, ptsTop[0].y);
            for(let p of ptsTop) ctx.lineTo(p.x, p.y);
            for(let i = ptsBot.length-1; i>=0; i--) ctx.lineTo(ptsBot[i].x, ptsBot[i].y);
            ctx.closePath();
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--fluid-color').trim();
            ctx.fill();

            // Draw Pressure Manometers
            function drawManometer(x, pVal, label) {
                let yPipeTop = cy - (Math.abs(x - cx) < 5 ? s2*50 : s1*50); // rough estimation

                ctx.fillStyle = '#64748b';
                ctx.fillRect(x - 5, yPipeTop - 100, 10, 100);

                // Fluid level in tube depends on pressure
                // P1 is ref (100kPa), let's say it rises 80px
                let rise = 80 + (pVal - P1) / 100; // arbitrary scale
                if (rise < 0) rise = 0;

                ctx.fillStyle = '#38bdf8';
                ctx.fillRect(x - 3, yPipeTop - rise, 6, rise);

                ctx.fillStyle = isDark ? '#fff' : '#000';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(label, x, yPipeTop - 110);
            }

            drawManometer(cx - 250, P1, "P1");
            drawManometer(cx, P2, "P2");
        }

        let lastTime = 0;
        function loop(timestamp) {
            if(!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            ctx.clearRect(0, 0, width, height);

            drawPipe();
            for(let p of particles) {
                p.update(dt);
                p.draw();
            }

            requestAnimationFrame(loop);
        }

        resize();
        updatePhysics();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
