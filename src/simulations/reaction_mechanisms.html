<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Supérieure: Mécanismes Réactionnels</title>
    <style>
        :root {
            --bg-color: #030712;
            --text-color: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #10b981;
            --accent-glow: 0 0 15px rgba(16, 185, 129, 0.6);
            --panel-bg: rgba(0,0,0,0.6);

            --arrow-color: #ef4444; /* Color of curly arrows */
            --atom-color: #f8fafc;
            --bond-color: #94a3b8;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.2);
            --accent-color: #059669;
            --accent-glow: 0 0 15px rgba(5, 150, 105, 0.4);
            --panel-bg: rgba(255,255,255,0.7);
            --atom-color: #0f172a;
            --bond-color: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; display: flex; height: 100vh; width: 100vw; transition: background-color 0.3s, color 0.3s; }
        #app-container { display: flex; width: 100%; height: 100%; }

        #visual-pane { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .section-box { background: var(--panel-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; position: relative; display: flex; flex-direction: column; }
        .section-title { position: absolute; top: 12px; left: 15px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); opacity: 0.8; z-index: 10; }

        #canvas-wrapper { flex: 1; position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius: 8px;}
        canvas { display: block; width: 100%; height: 100%; }

        #controls-pane { width: 380px; background: var(--glass-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; }
        h2 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 5px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        select { background: var(--bg-color); color: var(--text-color); border: 1px solid var(--glass-border); padding: 10px; border-radius: 6px; font-size: 0.95rem; cursor: pointer; outline: none; }
        select:focus { border-color: var(--accent-color); }

        .stats-box { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px; line-height: 1.5; }
        #theme-toggle { position: absolute; top: 15px; right: 15px; z-index: 20; background: var(--glass-bg); backdrop-filter: blur(5px); border: 1px solid var(--glass-border); color: var(--text-color); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        .btn-group { display: flex; gap: 8px; margin-top: auto; }
        button.action-btn { flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; text-align: center; }
        button.action-btn:hover { background: rgba(255,255,255,0.1); }
        .btn-play { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color) !important; box-shadow: var(--accent-glow); }
        .btn-play:hover { filter: brightness(1.1); }

        /* Timeline */
        .timeline { display: flex; justify-content: space-between; margin-top: 10px; position: relative; }
        .timeline::before { content: ''; position: absolute; top: 50%; left: 10px; right: 10px; height: 2px; background: var(--glass-border); z-index: 1; }
        .step-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-color); border: 2px solid var(--glass-border); z-index: 2; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; color: var(--text-muted); font-weight: bold; transition: 0.3s; }
        .step-dot.active { border-color: var(--accent-color); background: var(--accent-color); color: #fff; box-shadow: var(--accent-glow); }
        .step-dot.done { border-color: var(--accent-color); background: var(--glass-bg); color: var(--accent-color); }
    </style>
</head>
<body>

    <button id="theme-toggle">Thème</button>

    <div id="app-container">
        <div id="visual-pane">
            <div id="canvas-wrapper" class="section-box">
                <div class="section-title">Animation à l'échelle moléculaire</div>
                <div style="flex:1; position:relative; width:100%; height:100%; margin-top:20px;">
                    <canvas id="mechCanvas"></canvas>
                </div>
            </div>
        </div>

        <div id="controls-pane">
            <h2>Mécanismes Réactionnels</h2>
            <div style="text-align:center; font-size:0.8rem; color:gray; margin-top:-10px; margin-bottom:10px;">Flèches courbes & Transferts (Term. Spé)</div>

            <div class="control-group">
                <label>Sélectionner la réaction</label>
                <select id="reaction-select">
                    <option value="acid_base">Acide-Base: NH₃ + H₂O</option>
                    <option value="esterification">Estérification (Étape 1: Add. Nucl.)</option>
                </select>
            </div>

            <div class="stats-box" style="margin-top:10px;">
                <div style="font-weight:bold; color:var(--accent-color); border-bottom:1px solid var(--glass-border); padding-bottom:5px;">Explication de l'étape</div>
                <div id="step-desc" style="color:var(--text-muted);">
                    Sélectionnez une réaction pour commencer.
                </div>
            </div>

            <div class="control-group" style="margin-top:20px;">
                <label>Progression</label>
                <div class="timeline" id="timeline">
                    <!-- Dots added by JS -->
                </div>
            </div>

            <div class="btn-group">
                <button id="btn-prev" class="action-btn">⏴ Précédent</button>
                <button id="btn-play" class="action-btn btn-play">Animer</button>
                <button id="btn-next" class="action-btn">Suivant ⏵</button>
            </div>
            <div style="font-size:0.75rem; color:gray; text-align:center; margin-top:5px; font-style:italic;">
                Une flèche courbe indique toujours le mouvement d'un doublet d'électrons (d'un site donneur vers un site accepteur).
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mechCanvas');
        const ctx = canvas.getContext('2d');
        const reactSelect = document.getElementById('reaction-select');
        const themeToggle = document.getElementById('theme-toggle');
        const stepDesc = document.getElementById('step-desc');
        const timeline = document.getElementById('timeline');

        const btnPlay = document.getElementById('btn-play');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        let dpr = window.devicePixelRatio || 1;
        let cw, ch;
        let currentReaction = null;
        let currentStep = 0;
        let animProgress = 0; // 0 to 1
        let isAnimating = false;
        let lastTime = 0;

        // Data Structure for Reactions
        // A scene defines positions of atoms, bonds (lines), lone pairs (dots)
        // An animation defines curved arrows from source to target
        const REACTIONS = {
            acid_base: {
                title: "Acide-Base: Ammoniaque + Eau",
                steps: [
                    {
                        desc: "État Initial : L'ammoniaque (NH₃) est une base possédant un doublet non liant sur l'azote (site donneur). L'eau (H₂O) agit comme acide (site accepteur sur un atome H partiel positif).",
                        atoms: [
                            {id: 'n', text: 'N', x: -100, y: 0, charge: 0},
                            {id: 'h1', text: 'H', x: -150, y: 30},
                            {id: 'h2', text: 'H', x: -100, y: -50},
                            {id: 'h3', text: 'H', x: -60, y: 40},
                            {id: 'o', text: 'O', x: 100, y: 0, charge: 0},
                            {id: 'hw1', text: 'H', x: 40, y: 0},
                            {id: 'hw2', text: 'H', x: 130, y: 40}
                        ],
                        bonds: [
                            {from: 'n', to: 'h1'}, {from: 'n', to: 'h2'}, {from: 'n', to: 'h3'},
                            {from: 'o', to: 'hw1'}, {from: 'o', to: 'hw2'}
                        ],
                        lonePairs: [
                            {atom: 'n', angle: 0, dist: 25}, // Pointing right towards water
                            {atom: 'o', angle: -Math.PI/2, dist: 20},
                            {atom: 'o', angle: Math.PI/4, dist: 20}
                        ],
                        arrows: []
                    },
                    {
                        desc: "Mécanisme : Le doublet non liant de l'azote (nucléophile) vient capter le proton H+ de l'eau. Simultanément, la liaison O-H se rompt et son doublet se rabat sur l'atome d'oxygène (plus électronégatif).",
                        atoms: [
                            {id: 'n', text: 'N', x: -100, y: 0}, {id: 'h1', text: 'H', x: -150, y: 30}, {id: 'h2', text: 'H', x: -100, y: -50}, {id: 'h3', text: 'H', x: -60, y: 40},
                            {id: 'o', text: 'O', x: 100, y: 0}, {id: 'hw1', text: 'H', x: 40, y: 0}, {id: 'hw2', text: 'H', x: 130, y: 40}
                        ],
                        bonds: [
                            {from: 'n', to: 'h1'}, {from: 'n', to: 'h2'}, {from: 'n', to: 'h3'},
                            {from: 'o', to: 'hw1'}, {from: 'o', to: 'hw2'}
                        ],
                        lonePairs: [
                            {atom: 'n', angle: 0, dist: 25}, {atom: 'o', angle: -Math.PI/2, dist: 20}, {atom: 'o', angle: Math.PI/4, dist: 20}
                        ],
                        arrows: [
                            {from: {x: -75, y: 0}, to: {x: 30, y: 0}, ctrl1: {x: -30, y: -40}, ctrl2: {x: 0, y: -40}}, // N lp to H
                            {from: {x: 70, y: 0}, to: {x: 95, y: -15}, ctrl1: {x: 75, y: -20}, ctrl2: {x: 85, y: -20}} // O-H bond to O
                        ]
                    },
                    {
                        desc: "État Final : Formation de l'ion ammonium (NH₄⁺) et de l'ion hydroxyde (HO⁻). L'azote porte maintenant une charge formelle positive, et l'oxygène une charge négative.",
                        atoms: [
                            {id: 'n', text: 'N', x: -100, y: 0, charge: '+1'},
                            {id: 'h1', text: 'H', x: -150, y: 30}, {id: 'h2', text: 'H', x: -100, y: -50}, {id: 'h3', text: 'H', x: -60, y: 40},
                            {id: 'hw1', text: 'H', x: -40, y: 0}, // Moved to N
                            {id: 'o', text: 'O', x: 100, y: 0, charge: '-1'},
                            {id: 'hw2', text: 'H', x: 130, y: 40}
                        ],
                        bonds: [
                            {from: 'n', to: 'h1'}, {from: 'n', to: 'h2'}, {from: 'n', to: 'h3'}, {from: 'n', to: 'hw1'}, // New bond
                            {from: 'o', to: 'hw2'} // Bond broken
                        ],
                        lonePairs: [
                            {atom: 'o', angle: Math.PI, dist: 20}, // New lone pair from bond
                            {atom: 'o', angle: -Math.PI/2, dist: 20}, {atom: 'o', angle: Math.PI/4, dist: 20}
                        ],
                        arrows: []
                    }
                ]
            },
            esterification: {
                title: "Estérification : Addition Nucléophile",
                steps: [
                    {
                        desc: "État Initial : L'atome de carbone du groupe carbonyle (C=O) de l'acide est appauvri en électrons (C δ+). L'atome d'oxygène de l'alcool possède des doublets non liants (nucléophile).",
                        atoms: [
                            // Acide (Acetic acid simplified)
                            {id: 'c1', text: 'C', x: -50, y: 0, charge: 'δ+'},
                            {id: 'o1', text: 'O', x: -50, y: -60, charge: 'δ-'},
                            {id: 'oh', text: 'OH', x: -100, y: 40},
                            {id: 'ch3', text: 'CH₃', x: 10, y: 40},
                            // Alcool (Methanol simplified)
                            {id: 'o2', text: 'O', x: 120, y: 0},
                            {id: 'h_alc', text: 'H', x: 120, y: 50},
                            {id: 'ch3_alc', text: 'CH₃', x: 180, y: -30}
                        ],
                        bonds: [
                            {from: 'c1', to: 'o1', double: true}, {from: 'c1', to: 'oh'}, {from: 'c1', to: 'ch3'},
                            {from: 'o2', to: 'h_alc'}, {from: 'o2', to: 'ch3_alc'}
                        ],
                        lonePairs: [
                            {atom: 'o1', angle: Math.PI/4, dist: 25}, {atom: 'o1', angle: 3*Math.PI/4, dist: 25},
                            {atom: 'o2', angle: Math.PI, dist: 20}, {atom: 'o2', angle: -Math.PI/4, dist: 20}
                        ],
                        arrows: []
                    },
                    {
                        desc: "Mécanisme : Le doublet de l'oxygène de l'alcool attaque le carbone électrophile. Pour respecter la règle de l'octet (le C ne peut avoir 5 liaisons), un doublet de la liaison C=O se rabat sur l'oxygène.",
                        atoms: [
                            {id: 'c1', text: 'C', x: -50, y: 0}, {id: 'o1', text: 'O', x: -50, y: -60}, {id: 'oh', text: 'OH', x: -100, y: 40}, {id: 'ch3', text: 'CH₃', x: 10, y: 40},
                            {id: 'o2', text: 'O', x: 120, y: 0}, {id: 'h_alc', text: 'H', x: 120, y: 50}, {id: 'ch3_alc', text: 'CH₃', x: 180, y: -30}
                        ],
                        bonds: [
                            {from: 'c1', to: 'o1', double: true}, {from: 'c1', to: 'oh'}, {from: 'c1', to: 'ch3'},
                            {from: 'o2', to: 'h_alc'}, {from: 'o2', to: 'ch3_alc'}
                        ],
                        lonePairs: [
                            {atom: 'o1', angle: Math.PI/4, dist: 25}, {atom: 'o1', angle: 3*Math.PI/4, dist: 25},
                            {atom: 'o2', angle: Math.PI, dist: 20}, {atom: 'o2', angle: -Math.PI/4, dist: 20}
                        ],
                        arrows: [
                            {from: {x: 100, y: 0}, to: {x: -30, y: 0}, ctrl1: {x: 50, y: -40}, ctrl2: {x: 0, y: -40}}, // O attack C
                            {from: {x: -45, y: -30}, to: {x: -30, y: -60}, ctrl1: {x: -20, y: -30}, ctrl2: {x: -20, y: -50}} // C=O pi bond to O
                        ]
                    },
                    {
                        desc: "État Final (Intermédiaire Tétraédrique) : Formation d'une liaison C-O. L'oxygène du carbonyle porte une charge négative (O⁻) et l'oxygène de l'alcool une charge positive (O⁺). L'hybridation du carbone passe de sp² à sp³.",
                        atoms: [
                            {id: 'c1', text: 'C', x: -50, y: 0},
                            {id: 'o1', text: 'O', x: -50, y: -60, charge: '-1'}, // became O-
                            {id: 'oh', text: 'OH', x: -100, y: 40},
                            {id: 'ch3', text: 'CH₃', x: 10, y: 40},
                            {id: 'o2', text: 'O', x: 30, y: -30, charge: '+1'}, // Moved closer, became O+
                            {id: 'h_alc', text: 'H', x: 60, y: -60},
                            {id: 'ch3_alc', text: 'CH₃', x: 90, y: 0}
                        ],
                        bonds: [
                            {from: 'c1', to: 'o1', double: false}, // Single bond now
                            {from: 'c1', to: 'oh'}, {from: 'c1', to: 'ch3'},
                            {from: 'c1', to: 'o2'}, // New C-O bond
                            {from: 'o2', to: 'h_alc'}, {from: 'o2', to: 'ch3_alc'}
                        ],
                        lonePairs: [
                            {atom: 'o1', angle: Math.PI/4, dist: 25}, {atom: 'o1', angle: 3*Math.PI/4, dist: 25}, {atom: 'o1', angle: 0, dist: 25}, // 3rd LP
                            {atom: 'o2', angle: -Math.PI/4, dist: 20} // Only 1 LP left
                        ],
                        arrows: []
                    }
                ]
            }
        };

        function resize() {
            cw = canvas.parentElement.clientWidth;
            ch = canvas.parentElement.clientHeight;
            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            ctx.scale(dpr, dpr);
            drawScene();
        }
        window.addEventListener('resize', resize);

        themeToggle.addEventListener('click', () => {
            document.documentElement.setAttribute('data-theme',
                document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            );
            drawScene();
        });

        function loadReaction() {
            currentReaction = REACTIONS[reactSelect.value];
            currentStep = 0;
            animProgress = 0;
            isAnimating = false;

            // Build timeline
            timeline.innerHTML = '';
            currentReaction.steps.forEach((s, i) => {
                let dot = document.createElement('div');
                dot.className = 'step-dot';
                dot.textContent = i + 1;
                timeline.appendChild(dot);
            });

            updateUI();
        }

        reactSelect.addEventListener('change', loadReaction);

        function updateUI() {
            if (!currentReaction) return;
            stepDesc.textContent = currentReaction.steps[currentStep].desc;

            let dots = timeline.children;
            for(let i=0; i<dots.length; i++) {
                dots[i].className = 'step-dot';
                if(i < currentStep) dots[i].classList.add('done');
                if(i === currentStep) dots[i].classList.add('active');
            }

            btnPrev.disabled = currentStep === 0;
            btnNext.disabled = currentStep === currentReaction.steps.length - 1;

            // If current step has arrows, enable Play
            if (currentReaction.steps[currentStep].arrows && currentReaction.steps[currentStep].arrows.length > 0) {
                btnPlay.style.display = 'block';
                btnPlay.textContent = isAnimating ? 'Rejouer' : 'Animer le mécanisme';
            } else {
                btnPlay.style.display = 'none';
            }

            drawScene();
        }

        btnPrev.addEventListener('click', () => { if(currentStep > 0) { currentStep--; animProgress=0; isAnimating=false; updateUI(); } });
        btnNext.addEventListener('click', () => { if(currentStep < currentReaction.steps.length-1) { currentStep++; animProgress=0; isAnimating=false; updateUI(); } });
        btnPlay.addEventListener('click', () => {
            animProgress = 0;
            isAnimating = true;
            lastTime = 0;
            requestAnimationFrame(loop);
        });

        function getAtomPos(id) {
            let stepData = currentReaction.steps[currentStep];
            let a = stepData.atoms.find(at => at.id === id);
            // Centering offset
            return { x: cw/2 + a.x, y: ch/2 + a.y };
        }

        function drawBezierArrow(ctx, start, ctrl1, ctrl2, end, progress, color) {
            // progress 0 to 1 limits the drawing length of the bezier curve
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;

            // Calculate point on bezier curve at t=progress
            // B(t) = (1-t)^3 P0 + 3(1-t)^2 t P1 + 3(1-t) t^2 P2 + t^3 P3
            let pts = [];
            let steps = 40;
            let drawSteps = Math.max(1, Math.floor(steps * progress));

            for(let i=0; i<=drawSteps; i++) {
                let t = i / steps;
                let mt = 1 - t;
                let x = mt*mt*mt*start.x + 3*mt*mt*t*ctrl1.x + 3*mt*t*t*ctrl2.x + t*t*t*end.x;
                let y = mt*mt*mt*start.y + 3*mt*mt*t*ctrl1.y + 3*mt*t*t*ctrl2.y + t*t*t*end.y;
                pts.push({x:x, y:y});
            }

            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();

            // Arrow head at current tip
            if (pts.length > 1 && progress > 0.05) {
                let pLast = pts[pts.length-1];
                let pPrev = pts[pts.length-2];
                let angle = Math.atan2(pLast.y - pPrev.y, pLast.x - pPrev.x);
                let headlen = 10;

                ctx.beginPath();
                ctx.moveTo(pLast.x, pLast.y);
                ctx.lineTo(pLast.x - headlen * Math.cos(angle - Math.PI / 6), pLast.y - headlen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(pLast.x - headlen * Math.cos(angle + Math.PI / 6), pLast.y - headlen * Math.sin(angle + Math.PI / 6));
                ctx.lineTo(pLast.x, pLast.y);
                ctx.fillStyle = color;
                ctx.fill();
            }
        }

        function drawScene() {
            if(!currentReaction) return;
            ctx.clearRect(0, 0, cw, ch);

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const atomCol = getComputedStyle(document.documentElement).getPropertyValue('--atom-color').trim();
            const bondCol = getComputedStyle(document.documentElement).getPropertyValue('--bond-color').trim();
            const arrCol = getComputedStyle(document.documentElement).getPropertyValue('--arrow-color').trim();

            let stepData = currentReaction.steps[currentStep];

            // 1. Draw Bonds
            ctx.strokeStyle = bondCol;
            stepData.bonds.forEach(b => {
                let p1 = getAtomPos(b.from);
                let p2 = getAtomPos(b.to);

                if (b.double) {
                    // Draw two parallel lines
                    let dx = p2.x - p1.x; let dy = p2.y - p1.y;
                    let len = Math.hypot(dx, dy);
                    let nx = -dy/len * 4; let ny = dx/len * 4; // Normal vector scaled

                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(p1.x + nx, p1.y + ny); ctx.lineTo(p2.x + nx, p2.y + ny); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(p1.x - nx, p1.y - ny); ctx.lineTo(p2.x - nx, p2.y - ny); ctx.stroke();
                } else {
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            });

            // 2. Draw Lone Pairs
            ctx.fillStyle = atomCol;
            stepData.lonePairs.forEach(lp => {
                let p = getAtomPos(lp.atom);
                let lx = p.x + Math.cos(lp.angle) * lp.dist;
                let ly = p.y + Math.sin(lp.angle) * lp.dist;
                // Draw a pair of dots
                let dx = Math.cos(lp.angle + Math.PI/2) * 4;
                let dy = Math.sin(lp.angle + Math.PI/2) * 4;
                ctx.beginPath(); ctx.arc(lx + dx, ly + dy, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lx - dx, ly - dy, 2.5, 0, Math.PI*2); ctx.fill();
            });

            // 3. Draw Atoms (Text over background to hide lines under them)
            ctx.font = 'bold 20px "Inter", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            stepData.atoms.forEach(a => {
                let p = getAtomPos(a.id);
                // Clear background behind text
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
                let metrics = ctx.measureText(a.text);
                let w = Math.max(metrics.width + 10, 24);
                ctx.beginPath(); ctx.arc(p.x, p.y, w/2, 0, Math.PI*2); ctx.fill();

                // Draw text
                ctx.fillStyle = atomCol;
                ctx.fillText(a.text, p.x, p.y);

                // Draw charges
                if (a.charge) {
                    ctx.fillStyle = a.charge.includes('-') ? '#3b82f6' : '#ef4444';
                    ctx.font = 'bold 14px "Inter", sans-serif';
                    ctx.fillText(a.charge, p.x + w/2 + 5, p.y - 10);
                    ctx.font = 'bold 20px "Inter", sans-serif'; // reset
                }
            });

            // 4. Draw Curved Arrows (Animated)
            if (isAnimating && stepData.arrows) {
                stepData.arrows.forEach(arr => {
                    let start = {x: cw/2 + arr.from.x, y: ch/2 + arr.from.y};
                    let end = {x: cw/2 + arr.to.x, y: ch/2 + arr.to.y};
                    let c1 = {x: cw/2 + arr.ctrl1.x, y: ch/2 + arr.ctrl1.y};
                    let c2 = {x: cw/2 + arr.ctrl2.x, y: ch/2 + arr.ctrl2.y};

                    drawBezierArrow(ctx, start, c1, c2, end, animProgress, arrCol);
                });
            } else if (!isAnimating && animProgress > 0 && stepData.arrows) {
                // If finished animating but not moved to next step, draw full arrow
                stepData.arrows.forEach(arr => {
                    let start = {x: cw/2 + arr.from.x, y: ch/2 + arr.from.y};
                    let end = {x: cw/2 + arr.to.x, y: ch/2 + arr.to.y};
                    let c1 = {x: cw/2 + arr.ctrl1.x, y: ch/2 + arr.ctrl1.y};
                    let c2 = {x: cw/2 + arr.ctrl2.x, y: ch/2 + arr.ctrl2.y};
                    drawBezierArrow(ctx, start, c1, c2, end, 1.0, arrCol);
                });
            }
        }

        function loop(timestamp) {
            if (!isAnimating) return;
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            animProgress += dt * 0.7; // Speed of arrow drawing

            if (animProgress >= 1.0) {
                animProgress = 1.0;
                isAnimating = false;
                // Auto advance ? No, let user read description and click Next
                btnPlay.textContent = "Rejouer";
            }

            drawScene();

            if (isAnimating) requestAnimationFrame(loop);
        }

        // Init
        loadReaction();
        resize();

    </script>
</body>
