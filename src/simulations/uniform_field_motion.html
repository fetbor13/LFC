<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Supérieure: Mouvement dans un Champ Uniforme</title>
    <style>
        :root {
            --bg-color: #030712;
            --text-color: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #f59e0b;
            --accent-glow: 0 0 15px rgba(245, 158, 11, 0.6);
            --panel-bg: rgba(0,0,0,0.6);
            --traj-color: #2dd4bf;
            --grid-color: rgba(255, 255, 255, 0.05);
            --axis-color: rgba(255, 255, 255, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.2);
            --accent-color: #d97706;
            --accent-glow: 0 0 15px rgba(217, 119, 6, 0.4);
            --panel-bg: rgba(255,255,255,0.7);
            --grid-color: rgba(0, 0, 0, 0.05);
            --axis-color: rgba(0, 0, 0, 0.3);
            --traj-color: #0d9488;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; display: flex; height: 100vh; width: 100vw; transition: background-color 0.3s, color 0.3s; }
        #app-container { display: flex; width: 100%; height: 100%; }

        #canvas-container {
            flex-grow: 1; position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { display: block; width: 100%; height: 100%; }
        #controls-pane { width: 380px; background: var(--glass-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; overflow-x: hidden; }
        h2 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; display: flex; justify-content: space-between; font-weight: 500; color: var(--text-muted); }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--text-color); cursor: pointer; margin-top: -5px; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: var(--glass-border); border-radius: 1px; }

        .stats-box { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); font-family: 'Fira Code', monospace; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px; }
        .math-eq { font-style: italic; color: #10b981; font-weight: bold; }
        #theme-toggle { position: absolute; top: 15px; left: 15px; z-index: 20; background: var(--glass-bg); backdrop-filter: blur(5px); border: 1px solid var(--glass-border); color: var(--text-color); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        .switch-container { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; font-weight: 500; }
        input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent-color); cursor: pointer; }

        .mode-toggle { display: flex; border-radius: 6px; border: 1px solid var(--glass-border); overflow: hidden; margin-bottom: 5px; }
        .mode-btn { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; background: rgba(0,0,0,0.2); border: none; color: var(--text-muted); }
        .mode-btn.active { background: var(--accent-color); color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        button.action-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-color); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; text-align: center; }
        button.action-btn:hover { background: rgba(255,255,255,0.1); }
        .btn-fire { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color) !important; box-shadow: var(--accent-glow); }
        .btn-fire:hover { filter: brightness(1.1); }
        #controls-pane::-webkit-scrollbar { width: 6px; }
        #controls-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <button id="theme-toggle">Thème</button>

    <div id="app-container">
        <div id="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>

        <div id="controls-pane">
            <h2>Champ Uniforme</h2>

            <div class="mode-toggle">
                <button id="mode-grav" class="mode-btn active">Pesanteur $\vec{g}$</button>
                <button id="mode-elec" class="mode-btn">Électrostatique $\vec{E}$</button>
            </div>

            <!-- Common Controls -->
            <div class="control-group">
                <label>Vitesse initiale (v₀) <span id="v0-val">10.0 m/s</span></label>
                <input type="range" id="v0" min="0" max="30" step="0.5" value="10">
            </div>

            <div class="control-group">
                <label>Angle de tir (α) <span id="angle-val">45.0°</span></label>
                <input type="range" id="angle" min="-90" max="90" step="0.5" value="45">
            </div>

            <div style="height: 1px; background: var(--glass-border); margin: 5px 0;"></div>

            <!-- Gravity Specific Controls -->
            <div id="controls-grav">
                <div class="control-group">
                    <label>Gravité (g) <span id="g-val">9.81 m/s²</span></label>
                    <input type="range" id="grav" min="1" max="25" step="0.01" value="9.81">
                </div>
            </div>

            <!-- Electrostatic Specific Controls -->
            <div id="controls-elec" style="display:none;">
                <div class="control-group">
                    <label>Tension (U) <span id="u-val">500 V</span></label>
                    <input type="range" id="voltage" min="-1000" max="1000" step="10" value="500">
                </div>
                <div class="control-group">
                    <label>Particule</label>
                    <select id="particle-type" style="background:var(--bg-color); color:var(--text-color); padding:5px; border-radius:4px; border:1px solid var(--glass-border); font-size:0.85rem;">
                        <option value="electron">Électron (e⁻)</option>
                        <option value="proton">Proton (p⁺)</option>
                        <option value="alpha">Particule Alpha (He²⁺)</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <div class="switch-container">
                    <label style="color:#10b981;">Afficher $\vec{v}$</label>
                    <input type="checkbox" id="show-v" checked>
                </div>
                <div class="switch-container">
                    <label style="color:#ef4444;">Afficher $\vec{a}$</label>
                    <input type="checkbox" id="show-a" checked>
                </div>
            </div>

            <div class="stats-box">
                <div class="math-eq" id="eq-main">$\vec{a} = \vec{g}$</div>
                <div class="math-eq" id="eq-traj" style="font-size:0.75rem;">$y(x) = -\frac{g}{2v_0^2\cos^2\alpha}x^2 + \tan\alpha \cdot x$</div>
                <hr style="border-color: var(--glass-border); margin: 5px 0;">
                <div style="display:flex; justify-content:space-between;"><span>$t$:</span> <span id="stat-t" style="color:#fbbf24; font-weight:bold;">0.000 s</span></div>
                <div style="display:flex; justify-content:space-between;"><span>$x(t)$:</span> <span id="stat-x">0.000 m</span></div>
                <div style="display:flex; justify-content:space-between;"><span>$y(t)$:</span> <span id="stat-y">0.000 m</span></div>
            </div>

            <div style="display:flex; gap:10px; margin-top:auto;">
                <button id="btn-fire" class="action-btn btn-fire" style="flex:2;">Lancer (t=0)</button>
                <button id="btn-clear" class="action-btn" style="flex:1;">Effacer</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const themeToggle = document.getElementById('theme-toggle');

        const modeGravBtn = document.getElementById('mode-grav');
        const modeElecBtn = document.getElementById('mode-elec');
        const controlsGrav = document.getElementById('controls-grav');
        const controlsElec = document.getElementById('controls-elec');
        const eqMain = document.getElementById('eq-main');
        const eqTraj = document.getElementById('eq-traj');

        const v0Input = document.getElementById('v0');
        const angleInput = document.getElementById('angle');
        const gravInput = document.getElementById('grav');
        const voltageInput = document.getElementById('voltage');
        const particleSelect = document.getElementById('particle-type');

        const showV = document.getElementById('show-v');
        const showA = document.getElementById('show-a');

        const statT = document.getElementById('stat-t');
        const statX = document.getElementById('stat-x');
        const statY = document.getElementById('stat-y');

        const btnFire = document.getElementById('btn-fire');
        const btnClear = document.getElementById('btn-clear');

        let width, height;
        let dpr = window.devicePixelRatio || 1;
        let mode = 'grav';

        const e_charge = 1.602e-19;
        const m_e = 9.109e-31;
        const m_p = 1.672e-27;
        const d_plates = 0.1; // meters

        let particles = [];
        let isRunning = false;
        let animId;
        let lastTime = 0;

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            drawStatic();
        }
        window.addEventListener('resize', resize);

        themeToggle.addEventListener('click', () => {
            document.documentElement.setAttribute('data-theme',
                document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            );
            drawStatic();
        });

        function switchMode(newMode) {
            mode = newMode;
            modeGravBtn.classList.toggle('active', mode === 'grav');
            modeElecBtn.classList.toggle('active', mode === 'elec');
            controlsGrav.style.display = mode === 'grav' ? 'block' : 'none';
            controlsElec.style.display = mode === 'elec' ? 'block' : 'none';

            if (mode === 'grav') {
                document.documentElement.style.setProperty('--accent-color', '#f59e0b');
                document.documentElement.style.setProperty('--accent-glow', '0 0 15px rgba(245, 158, 11, 0.6)');
                eqMain.innerHTML = "$\\vec{a} = \\vec{g}$";
                eqTraj.innerHTML = "$y(x) = -\\frac{g}{2v_0^2\\cos^2\\alpha}x^2 + \\tan\\alpha \\cdot x$";
            } else {
                document.documentElement.style.setProperty('--accent-color', '#3b82f6');
                document.documentElement.style.setProperty('--accent-glow', '0 0 15px rgba(59, 130, 246, 0.6)');
                eqMain.innerHTML = "$\\vec{a} = \\frac{q}{m}\\vec{E} = \\frac{qU}{md}\\vec{u}_y$";
                eqTraj.innerHTML = "$y(x) = \\frac{qU}{2md v_0^2\\cos^2\\alpha}x^2 + \\tan\\alpha \\cdot x$";
            }
            if(window.MathJax && MathJax.typesetPromise) { MathJax.typesetClear(); MathJax.typesetPromise().catch(()=>{}); }

            updateLabels();
            particles = [];
            drawStatic();
        }

        modeGravBtn.addEventListener('click', () => switchMode('grav'));
        modeElecBtn.addEventListener('click', () => switchMode('elec'));

        function updateLabels() {
            if (mode === 'grav') {
                document.getElementById('v0-val').textContent = parseFloat(v0Input.value).toFixed(1) + ' m/s';
            } else {
                document.getElementById('v0-val').textContent = parseFloat(v0Input.value).toFixed(1) + ' × 10⁶ m/s';
            }
            document.getElementById('angle-val').textContent = parseFloat(angleInput.value).toFixed(1) + '°';
            document.getElementById('g-val').textContent = parseFloat(gravInput.value).toFixed(2) + ' m/s²';
            document.getElementById('u-val').textContent = parseInt(voltageInput.value) + ' V';
            drawStatic();
        }

        v0Input.addEventListener('input', updateLabels);
        angleInput.addEventListener('input', updateLabels);
        gravInput.addEventListener('input', updateLabels);
        voltageInput.addEventListener('input', updateLabels);
        particleSelect.addEventListener('change', updateLabels);

        // Arrow drawing utility
        function drawArrow(ctx, fromX, fromY, toX, toY, color, lineWidth = 2.5) {
            const headlen = 14; // Bigger head
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawGrid(originX, originY, scaleX, scaleY) {
            const gridCol = getComputedStyle(document.documentElement).getPropertyValue('--grid-color').trim();
            const axisCol = getComputedStyle(document.documentElement).getPropertyValue('--axis-color').trim();

            ctx.strokeStyle = gridCol;
            ctx.lineWidth = 1;
            ctx.beginPath();

            // Major grid lines
            const stepX = scaleX; // 1 unit
            const stepY = scaleY; // 1 unit

            for (let x = originX % stepX; x < width; x += stepX) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = originY % stepY; y < height; y += stepY) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            // Axes
            ctx.strokeStyle = axisCol;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, originY); ctx.lineTo(width, originY);
            ctx.moveTo(originX, 0); ctx.lineTo(originX, height);
            ctx.stroke();
        }

        class Projectile {
            constructor() {
                this.mode = mode;
                this.v0_ui = parseFloat(v0Input.value);
                this.angle = parseFloat(angleInput.value) * Math.PI / 180;

                this.t = 0;
                this.x = 0;
                this.y = 0;
                this.active = true;
                this.path = [];

                if (this.mode === 'grav') {
                    this.v0 = this.v0_ui;
                    this.g = parseFloat(gravInput.value);
                    this.ax = 0;
                    this.ay = -this.g;
                    this.scaleX = 40; // px per meter
                    this.scaleY = 40;
                    this.originX = 80;
                    this.originY = height - 80;
                    this.color = '#f59e0b';
                } else {
                    this.v0 = this.v0_ui * 1e6;
                    let pType = particleSelect.value;
                    let q, m;
                    if (pType === 'electron') { q = -e_charge; m = m_e; this.color = '#3b82f6'; }
                    else if (pType === 'proton') { q = e_charge; m = m_p; this.color = '#ef4444'; }
                    else { q = 2 * e_charge; m = 4 * m_p; this.color = '#10b981'; }

                    let U = parseFloat(voltageInput.value);
                    let E_field = U / d_plates;
                    this.ay = (q * E_field) / m;
                    this.ax = 0;

                    this.scaleX = width / 0.15; // Screen represents 15cm width
                    this.scaleY = this.scaleX; // uniform scale
                    this.originX = 80;
                    this.originY = height / 2;
                }

                this.vx = this.v0 * Math.cos(this.angle);
                this.vy = this.v0 * Math.sin(this.angle);
            }

            update(dt) {
                if (!this.active) return;

                let simDt = (this.mode === 'elec') ? dt * 1e-8 : dt * 1.5;

                // High precision integration (Euler)
                let steps = 10;
                let dts = simDt / steps;

                for(let i=0; i<steps; i++) {
                    this.t += dts;
                    this.vx += this.ax * dts;
                    this.vy += this.ay * dts;
                    this.x += this.vx * dts;
                    this.y += this.vy * dts;
                }

                let screenX = this.originX + this.x * this.scaleX;
                let screenY = this.originY - this.y * this.scaleY;

                // Only push points if they moved enough (optimization & crispness)
                if (this.path.length === 0 || Math.hypot(this.path[this.path.length-1].x - screenX, this.path[this.path.length-1].y - screenY) > 1) {
                    this.path.push({x: screenX, y: screenY});
                }

                // Boundaries
                if (this.mode === 'grav') {
                    if (screenY > this.originY) this.active = false;
                } else {
                    let topPlateY = this.originY - (d_plates/2) * this.scaleY;
                    let botPlateY = this.originY + (d_plates/2) * this.scaleY;
                    if (screenY < topPlateY || screenY > botPlateY) this.active = false;
                }

                if (screenX > width) this.active = false;
            }

            draw(ctx) {
                // Path
                if (this.path.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.path[0].x, this.path[0].y);
                    for (let i = 1; i < this.path.length; i++) ctx.lineTo(this.path[i].x, this.path[i].y);
                    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--traj-color').trim();
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Particle
                if (this.path.length > 0) {
                    let lastPos = this.path[this.path.length - 1];

                    ctx.beginPath();
                    ctx.arc(lastPos.x, lastPos.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();

                    // Vectors
                    if (showV.checked && this.active) {
                        let vScale = (this.mode === 'grav') ? 4 : (4 / 1e6);
                        drawArrow(ctx, lastPos.x, lastPos.y, lastPos.x + this.vx * vScale, lastPos.y - this.vy * vScale, '#10b981', 2.5);
                    }
                    if (showA.checked && this.active && Math.abs(this.ay) > 0) {
                        let aScale = (this.mode === 'grav') ? 5 : (5 / 1e13);
                        drawArrow(ctx, lastPos.x, lastPos.y, lastPos.x + this.ax * aScale, lastPos.y - this.ay * aScale, '#ef4444', 2.5);
                    }
                }
            }
        }

        function drawStatic() {
            if(!width) return;
            ctx.clearRect(0, 0, width, height);

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            if (mode === 'grav') {
                drawGrid(80, height - 80, 40, 40);

                // Gun
                let angle = parseFloat(angleInput.value) * Math.PI / 180;
                ctx.save();
                ctx.translate(80, height - 80);
                ctx.rotate(-angle);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
                ctx.beginPath(); ctx.roundRect(-10, -4, 25, 8, 2); ctx.fill();
                ctx.restore();
                ctx.beginPath(); ctx.arc(80, height - 80, 4, 0, Math.PI*2); ctx.fillStyle=isDark?'#fff':'#000'; ctx.fill();

            } else {
                let scale = width / 0.15;
                drawGrid(80, height / 2, scale * 0.05, scale * 0.05); // Grid every 5cm

                let plateY_top = height/2 - (d_plates/2)*scale;
                let plateY_bot = height/2 + (d_plates/2)*scale;

                let U = parseFloat(voltageInput.value);

                // Fine Plates
                ctx.fillStyle = isDark ? '#475569' : '#cbd5e1';
                ctx.fillRect(80, plateY_top - 6, width - 120, 6);
                ctx.fillRect(80, plateY_bot, width - 120, 6);

                // Signs
                ctx.font = '14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline='middle';
                if (U !== 0) {
                    ctx.fillStyle = U < 0 ? '#ef4444' : '#3b82f6';
                    ctx.fillText(U < 0 ? '++++++++' : '--------', width/2, plateY_top - 12);
                    ctx.fillStyle = U > 0 ? '#ef4444' : '#3b82f6';
                    ctx.fillText(U > 0 ? '++++++++' : '--------', width/2, plateY_bot + 12);
                }

                // Electric Field Lines
                if (Math.abs(U) > 0) {
                    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 0.5;
                    for (let x = 120; x < width - 60; x += 60) {
                        if (U < 0) { // Top +, Bot - -> E down
                            drawArrow(ctx, x, plateY_top, x, plateY_bot, ctx.strokeStyle, 0.5);
                        } else {
                            drawArrow(ctx, x, plateY_bot, x, plateY_top, ctx.strokeStyle, 0.5);
                        }
                    }
                }

                // Source
                let angle = parseFloat(angleInput.value) * Math.PI / 180;
                ctx.save();
                ctx.translate(80, height / 2);
                ctx.rotate(-angle);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
                ctx.beginPath(); ctx.roundRect(-15, -4, 20, 8, 2); ctx.fill();
                ctx.restore();
            }

            particles.forEach(p => p.draw(ctx));
        }

        btnFire.addEventListener('click', () => {
            particles.push(new Projectile());
            if (!isRunning) {
                isRunning = true;
                lastTime = 0;
                animId = requestAnimationFrame(loop);
            }
        });

        btnClear.addEventListener('click', () => {
            particles = [];
            isRunning = false;
            cancelAnimationFrame(animId);
            statT.textContent = "0.000 s";
            statX.textContent = "0.000 m";
            statY.textContent = "0.000 m";
            drawStatic();
        });

        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            let anyActive = false;
            particles.forEach(p => {
                p.update(dt);
                if (p.active) {
                    anyActive = true;
                    if (p.mode === 'grav') {
                        statT.innerHTML = p.t.toFixed(3) + ' s';
                        statX.innerHTML = p.x.toFixed(3) + ' m';
                        statY.innerHTML = p.y.toFixed(3) + ' m';
                    } else {
                        statT.innerHTML = (p.t * 1e9).toFixed(1) + ' ns';
                        statX.innerHTML = (p.x * 100).toFixed(2) + ' cm';
                        statY.innerHTML = (p.y * 100).toFixed(2) + ' cm';
                    }
                }
            });

            drawStatic();

            if (anyActive) {
                animId = requestAnimationFrame(loop);
            } else {
                isRunning = false;
                lastTime = 0;
            }
        }

        updateLabels();
        resize();

        // Inject MathJax
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
        script.async = true;
        document.head.appendChild(script);

    </script>
</body>
</html>
