<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Supérieure: Cinétique & Arrhenius</title>
    <style>
        :root {
            --bg-color: #030712;
            --text-color: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #f43f5e;
            --accent-glow: 0 0 15px rgba(244, 63, 94, 0.6);
            --panel-bg: rgba(0,0,0,0.5);
            --a-color: #3b82f6;
            --b-color: #10b981;
            --arr-color: #f59e0b;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.2);
            --accent-color: #e11d48;
            --accent-glow: 0 0 15px rgba(225, 29, 72, 0.4);
            --panel-bg: rgba(255,255,255,0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; display: flex; height: 100vh; width: 100vw; transition: background-color 0.3s, color 0.3s; }
        #app-container { display: flex; width: 100%; height: 100%; }

        #visual-pane { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .section-box { background: var(--panel-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; position: relative; display: flex; flex-direction: column; }
        .section-title { position: absolute; top: 12px; left: 15px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); opacity: 0.8; z-index: 10; }

        #graph-section { flex: 2; display: flex; justify-content: center; align-items: center; }
        .bottom-graphs { flex: 1; display: flex; gap: 20px; }
        #linear-section, #arrhenius-section { flex: 1; position: relative; }

        canvas { display: block; width: 100%; height: 100%; background: #000; border-radius: 6px; }

        #controls-pane { width: 380px; background: var(--glass-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; }
        h2 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; display: flex; justify-content: space-between; font-weight: 500; color: var(--text-muted); }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--text-color); cursor: pointer; margin-top: -5px; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: var(--glass-border); border-radius: 1px; }
        select { background: var(--bg-color); color: var(--text-color); border: 1px solid var(--glass-border); padding: 8px; border-radius: 4px; font-size: 0.95rem; }

        .stats-box { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); font-family: 'Fira Code', monospace; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px; }
        .math-eq { font-style: italic; color: #10b981; font-weight: bold; }
        #theme-toggle { position: absolute; top: 15px; right: 15px; z-index: 20; background: var(--glass-bg); backdrop-filter: blur(5px); border: 1px solid var(--glass-border); color: var(--text-color); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        .btn-group { display: flex; gap: 8px; }
        button.action-btn { flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px;}
        button.action-btn:hover { background: rgba(255,255,255,0.1); }
        .btn-play { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color) !important; box-shadow: var(--accent-glow); }
        .btn-play:hover { filter: brightness(1.1); }
        .btn-danger { color: #ef4444 !important; border-color: rgba(239,68,68,0.3) !important; }
        .btn-danger:hover { background: rgba(239,68,68,0.1) !important; }
    </style>
</head>
<body>

    <button id="theme-toggle">Thème</button>

    <div id="app-container">
        <div id="visual-pane">
            <div id="graph-section" class="section-box">
                <div class="section-title">Suivi Temporel : Concentrations</div>
                <div style="flex:1; position:relative; width:100%; height:100%; margin-top:20px;">
                    <canvas id="graphCanvas"></canvas>
                </div>
            </div>

            <div class="bottom-graphs">
                <div id="linear-section" class="section-box">
                    <div class="section-title">Linéarisation (Ordre)</div>
                    <div style="flex:1; position:relative; width:100%; height:100%; margin-top:20px;">
                        <canvas id="linCanvas"></canvas>
                    </div>
                </div>

                <div id="arrhenius-section" class="section-box">
                    <div class="section-title">Loi d'Arrhenius $\ln k = f(1/T)$</div>
                    <div style="flex:1; position:relative; width:100%; height:100%; margin-top:20px;">
                        <canvas id="arrCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="controls-pane">
            <h2>Cinétique Chimique</h2>
            <div style="text-align:center; font-size:0.8rem; color:gray; margin-top:-10px; margin-bottom:10px;">Vitesse, Ordres & Facteurs Température</div>

            <div class="control-group">
                <label>Ordre de réaction</label>
                <select id="order-select">
                    <option value="0">Ordre 0 ($v = k$)</option>
                    <option value="1" selected>Ordre 1 ($v = k[A]$)</option>
                    <option value="2">Ordre 2 ($v = k[A]^2$)</option>
                </select>
            </div>

            <div class="control-group">
                <label>$[A]_0$ Initiale <span id="a0-val">1.00 mol/L</span></label>
                <input type="range" id="a0-input" min="0.1" max="2.0" step="0.1" value="1.0">
            </div>

            <div style="height: 1px; background: var(--glass-border); margin: 5px 0;"></div>

            <div class="control-group">
                <label>Température ($T$) <span id="t-val">300 K</span></label>
                <input type="range" id="t-input" min="273" max="400" step="1" value="300">
            </div>

            <div class="control-group">
                <label>Énergie d'Activation ($E_a$) <span id="ea-val">50 kJ/mol</span></label>
                <input type="range" id="ea-input" min="10" max="100" step="5" value="50">
            </div>

            <div class="stats-box" style="margin-top:5px;">
                <div class="math-eq" id="eq-law">$k = A \exp\left(-\frac{E_a}{RT}\right)$</div>
                <hr style="border-color: var(--glass-border); margin: 5px 0;">
                <div style="display:flex; justify-content:space-between;"><span>Constante $k$:</span> <span id="stat-k" style="color:#fbbf24;">0.000</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Temps $t$:</span> <span id="stat-t">0.00 s</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Demi-vie $t_{1/2}$:</span> <span id="stat-t12" style="font-weight:bold;">0.00 s</span></div>
                <hr style="border-color: var(--glass-border); margin: 5px 0;">
                <div style="display:flex; justify-content:space-between; color:var(--a-color);"><span>$[A]$:</span> <span id="stat-a">1.000 mol/L</span></div>
                <div style="display:flex; justify-content:space-between; color:var(--b-color);"><span>$[B]$:</span> <span id="stat-b">0.000 mol/L</span></div>
            </div>

            <!-- Playback Controls -->
            <div class="btn-group" style="margin-top:auto;">
                <button id="btn-play" class="action-btn btn-play" style="flex:2;">▶ Démarrer</button>
                <button id="btn-step" class="action-btn">⏐▶ Pas</button>
                <button id="btn-reset" class="action-btn btn-danger">RAZ</button>
            </div>
        </div>
    </div>

    <script>
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');
        const linCanvas = document.getElementById('linCanvas');
        const lCtx = linCanvas.getContext('2d');
        const arrCanvas = document.getElementById('arrCanvas');
        const aCtx = arrCanvas.getContext('2d');

        const orderSelect = document.getElementById('order-select');
        const a0Input = document.getElementById('a0-input');
        const tInput = document.getElementById('t-input');
        const eaInput = document.getElementById('ea-input');

        const btnPlay = document.getElementById('btn-play');
        const btnStep = document.getElementById('btn-step');
        const btnReset = document.getElementById('btn-reset');
        const themeToggle = document.getElementById('theme-toggle');

        let dpr = window.devicePixelRatio || 1;
        let order = 1;
        let A0 = 1.0;
        let Temp = 300; // Kelvin
        let Ea = 50000; // Joules/mol

        // Physics constants
        const R = 8.314;
        const A_prefactor = 1e8; // Arbitrary pre-exponential factor for visualization

        let k_rate = 0;
        let isRunning = false;

        let t = 0;
        let A_conc = 1.0;
        let B_conc = 0.0;
        let v_speed = 0;
        let dataPoints = [];
        let arrheniusPoints = []; // Stores the points plotted on Arrhenius graph based on user T changes

        let gWidth, gHeight, lWidth, lHeight, aWidth, aHeight;

        function resize() {
            gWidth = graphCanvas.parentElement.clientWidth;
            gHeight = graphCanvas.parentElement.clientHeight;
            graphCanvas.width = gWidth * dpr;
            graphCanvas.height = gHeight * dpr;
            gCtx.scale(dpr, dpr);

            lWidth = linCanvas.parentElement.clientWidth;
            lHeight = linCanvas.parentElement.clientHeight;
            linCanvas.width = lWidth * dpr;
            linCanvas.height = lHeight * dpr;
            lCtx.scale(dpr, dpr);

            aWidth = arrCanvas.parentElement.clientWidth;
            aHeight = arrCanvas.parentElement.clientHeight;
            arrCanvas.width = aWidth * dpr;
            arrCanvas.height = aHeight * dpr;
            aCtx.scale(dpr, dpr);

            drawAll();
        }
        window.addEventListener('resize', resize);

        themeToggle.addEventListener('click', () => {
            document.documentElement.setAttribute('data-theme',
                document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            );
            drawAll();
        });

        function calculateK() {
            Ea = parseFloat(eaInput.value) * 1000; // Convert to Joules
            Temp = parseFloat(tInput.value);
            // Arrhenius equation: k = A * exp(-Ea / RT)
            k_rate = A_prefactor * Math.exp(-Ea / (R * Temp));

            document.getElementById('t-val').textContent = Temp + ' K';
            document.getElementById('ea-val').textContent = (Ea/1000) + ' kJ/mol';
            document.getElementById('stat-k').textContent = k_rate.toExponential(2);

            // Record T change in Arrhenius plot if not already there
            let invT = 1 / Temp;
            let lnK = Math.log(k_rate);
            if (!arrheniusPoints.find(p => Math.abs(p.invT - invT) < 0.00001)) {
                arrheniusPoints.push({invT: invT, lnK: lnK});
            }
        }

        function updateUI() {
            order = parseInt(orderSelect.value);
            A0 = parseFloat(a0Input.value);
            document.getElementById('a0-val').textContent = A0.toFixed(2) + ' mol/L';

            calculateK();

            let t12 = 0;
            if (order === 0) t12 = A0 / (2 * k_rate);
            else if (order === 1) t12 = Math.LN2 / k_rate;
            else if (order === 2) t12 = 1 / (k_rate * A0);

            document.getElementById('stat-t12').textContent = t12.toFixed(2) + ' s';

            if (!isRunning && t === 0) resetSim();
        }

        orderSelect.addEventListener('change', updateUI);
        a0Input.addEventListener('input', updateUI);
        tInput.addEventListener('input', () => { updateUI(); drawArrhenius(); });
        eaInput.addEventListener('input', () => { arrheniusPoints = []; updateUI(); drawArrhenius(); });

        function resetSim() {
            t = 0;
            A_conc = A0;
            B_conc = 0;
            dataPoints = [];
            dataPoints.push({t: t, A: A_conc, B: B_conc});

            isRunning = false;
            btnPlay.innerHTML = "▶ Démarrer";
            btnPlay.classList.remove('btn-danger');

            updateStats();
            drawAll();
        }

        btnPlay.addEventListener('click', () => {
            if (A_conc <= 0.01 && !isRunning) resetSim(); // auto reset if finished

            isRunning = !isRunning;
            if (isRunning) {
                btnPlay.innerHTML = "⏸ Pause";
                btnPlay.classList.add('btn-danger');
                lastTime = 0;
                requestAnimationFrame(loop);
            } else {
                btnPlay.innerHTML = "▶ Reprendre";
                btnPlay.classList.remove('btn-danger');
            }
        });

        btnStep.addEventListener('click', () => {
            if (isRunning) {
                isRunning = false;
                btnPlay.innerHTML = "▶ Reprendre";
                btnPlay.classList.remove('btn-danger');
            }
            if (A_conc > 0.001) {
                calculatePhysics(0.1); // Fixed step
                updateStats();
                drawAll();
            }
        });

        btnReset.addEventListener('click', resetSim);

        function updateStats() {
            document.getElementById('stat-t').textContent = t.toFixed(2) + ' s';
            document.getElementById('stat-a').textContent = A_conc.toFixed(3) + ' mol/L';
            document.getElementById('stat-b').textContent = B_conc.toFixed(3) + ' mol/L';
        }

        // DRAWING FUNCTIONS
        function drawGraph() {
            gCtx.clearRect(0, 0, gWidth, gHeight);

            gCtx.strokeStyle = 'rgba(255,255,255,0.1)';
            gCtx.lineWidth = 1;
            gCtx.beginPath();
            for(let i=1; i<10; i++) {
                gCtx.moveTo(0, i*gHeight/10); gCtx.lineTo(gWidth, i*gHeight/10);
                gCtx.moveTo(i*gWidth/10, 0); gCtx.lineTo(i*gWidth/10, gHeight);
            }
            gCtx.stroke();

            if (dataPoints.length === 0) return;

            let tMax = Math.max(10, t * 1.2);
            let maxConc = 2.0;

            function plotCurve(valKey, color) {
                gCtx.beginPath();
                gCtx.strokeStyle = color;
                gCtx.lineWidth = 2.5;

                for(let i=0; i<dataPoints.length; i++) {
                    let pt = dataPoints[i];
                    let x = (pt.t / tMax) * gWidth;
                    let y = gHeight - (pt[valKey] / maxConc) * gHeight;

                    if(i===0) gCtx.moveTo(x, y);
                    else gCtx.lineTo(x, y);
                }
                gCtx.stroke();
            }

            let aColor = getComputedStyle(document.documentElement).getPropertyValue('--a-color').trim();
            let bColor = getComputedStyle(document.documentElement).getPropertyValue('--b-color').trim();

            plotCurve('A', aColor);
            plotCurve('B', bColor);

            // Tangent Vector
            if (dataPoints.length > 0 && A_conc > 0.01) {
                let pt = dataPoints[dataPoints.length-1];
                let xPx = (pt.t / tMax) * gWidth;
                let yPx = gHeight - (pt.A / maxConc) * gHeight;

                // slope dy/dx = -v.
                // in px: slope = (-v / maxConc * gHeight) / (1 / tMax * gWidth)
                let slope = (-v_speed / maxConc * gHeight) / (1 / tMax * gWidth);
                slope = -slope; // canvas inverted Y

                let dx = 40;
                gCtx.beginPath();
                gCtx.moveTo(xPx - dx, yPx - slope*dx);
                gCtx.lineTo(xPx + dx, yPx + slope*dx);
                gCtx.strokeStyle = '#f43f5e';
                gCtx.lineWidth = 1.5;
                gCtx.stroke();

                // Vector Head (Direction of reaction)
                drawArrow(gCtx, xPx, yPx, xPx + dx, yPx + slope*dx, '#f43f5e', 2);

                gCtx.beginPath(); gCtx.arc(xPx, yPx, 4, 0, Math.PI*2); gCtx.fillStyle = '#fff'; gCtx.fill();
            }

            gCtx.fillStyle = '#fff'; gCtx.font = '11px monospace';
            gCtx.fillText(`[A] Réactif`, 10, 20); gCtx.fillStyle = aColor; gCtx.fillRect(85, 12, 10, 10);
            gCtx.fillStyle = '#fff'; gCtx.fillText(`[B] Produit`, 10, 35); gCtx.fillStyle = bColor; gCtx.fillRect(85, 27, 10, 10);
        }

        function drawLinear() {
            lCtx.clearRect(0, 0, lWidth, lHeight);

            lCtx.strokeStyle = 'rgba(255,255,255,0.1)';
            lCtx.lineWidth = 1;
            lCtx.beginPath();
            for(let i=1; i<5; i++) {
                lCtx.moveTo(0, i*lHeight/5); lCtx.lineTo(lWidth, i*lHeight/5);
                lCtx.moveTo(i*lWidth/5, 0); lCtx.lineTo(i*lWidth/5, lHeight);
            }
            lCtx.stroke();

            if (dataPoints.length === 0) return;

            let tMax = Math.max(10, t * 1.2);
            let yMin = 0, yMax = 1;
            let fLabel = '';

            if (order === 0) { yMin = 0; yMax = 2.0; fLabel = '[A]'; }
            else if (order === 1) { yMin = -5; yMax = 1; fLabel = 'ln[A]'; }
            else if (order === 2) { yMin = 0; yMax = 10; fLabel = '1/[A]'; }

            lCtx.beginPath();
            lCtx.strokeStyle = '#10b981';
            lCtx.lineWidth = 2.5;

            for(let i=0; i<dataPoints.length; i++) {
                let pt = dataPoints[i];
                if (pt.A <= 0.001) break;

                let valY = 0;
                if (order === 0) valY = pt.A;
                else if (order === 1) valY = Math.log(pt.A);
                else if (order === 2) valY = 1 / pt.A;

                let x = (pt.t / tMax) * lWidth;
                let normY = (valY - yMin) / (yMax - yMin);
                let y = lHeight - normY * lHeight;

                if(i===0) lCtx.moveTo(x, y);
                else lCtx.lineTo(x, y);
            }
            lCtx.stroke();

            lCtx.fillStyle = 'rgba(255,255,255,0.5)';
            lCtx.font = '10px monospace';
            lCtx.fillText(fLabel, 5, 15);
        }

        function drawArrhenius() {
            aCtx.clearRect(0, 0, aWidth, aHeight);

            // X-axis: 1/T (from 1/400 to 1/273)
            // Y-axis: ln(k) (depends on Ea, usually negative)
            let xMin = 1/400; let xMax = 1/273;
            let yMin = Math.log(A_prefactor * Math.exp(-100000 / (R * 273))); // Ea=100k, T=273 (smallest k)
            let yMax = Math.log(A_prefactor * Math.exp(-10000 / (R * 400))); // Ea=10k, T=400 (largest k)

            aCtx.strokeStyle = 'rgba(255,255,255,0.1)';
            aCtx.lineWidth = 1;
            aCtx.beginPath();
            for(let i=1; i<5; i++) {
                aCtx.moveTo(0, i*aHeight/5); aCtx.lineTo(aWidth, i*aHeight/5);
                aCtx.moveTo(i*aWidth/5, 0); aCtx.lineTo(i*aWidth/5, aHeight);
            }
            aCtx.stroke();

            // Draw theoretical line for current Ea
            aCtx.beginPath();
            aCtx.strokeStyle = 'rgba(255,255,255,0.3)';
            aCtx.lineWidth = 1.5;
            aCtx.setLineDash([4, 4]);
            let lnk1 = Math.log(A_prefactor) - (Ea / R) * xMin;
            let lnk2 = Math.log(A_prefactor) - (Ea / R) * xMax;
            aCtx.moveTo(0, aHeight - ((lnk1 - yMin) / (yMax - yMin)) * aHeight);
            aCtx.lineTo(aWidth, aHeight - ((lnk2 - yMin) / (yMax - yMin)) * aHeight);
            aCtx.stroke();
            aCtx.setLineDash([]);

            // Plot captured points
            const arrCol = getComputedStyle(document.documentElement).getPropertyValue('--arr-color').trim();
            arrheniusPoints.forEach(p => {
                let px = ((p.invT - xMin) / (xMax - xMin)) * aWidth;
                let py = aHeight - ((p.lnK - yMin) / (yMax - yMin)) * aHeight;
                aCtx.beginPath(); aCtx.arc(px, py, 3, 0, Math.PI*2);
                aCtx.fillStyle = arrCol; aCtx.fill();
            });

            // Current state point
            let currInvT = 1/Temp;
            let currLnK = Math.log(k_rate);
            let cpx = ((currInvT - xMin) / (xMax - xMin)) * aWidth;
            let cpy = aHeight - ((currLnK - yMin) / (yMax - yMin)) * aHeight;
            aCtx.beginPath(); aCtx.arc(cpx, cpy, 5, 0, Math.PI*2);
            aCtx.fillStyle = '#fff'; aCtx.fill();
            aCtx.strokeStyle = arrCol; aCtx.lineWidth = 2; aCtx.stroke();

            aCtx.fillStyle = 'rgba(255,255,255,0.5)';
            aCtx.font = '10px monospace';
            aCtx.fillText('Pente = -Ea/R', aWidth/2 - 30, aHeight/2);
        }

        // Utility
        function drawArrow(ctx, fromX, fromY, toX, toY, color, lineWidth = 2) {
            const headlen = 10;
            const dx = toX - fromX; const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY);
            ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI/6), toY - headlen * Math.sin(angle - Math.PI/6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI/6), toY - headlen * Math.sin(angle + Math.PI/6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color; ctx.fill();
        }

        function drawAll() {
            drawGraph();
            drawLinear();
            drawArrhenius();
        }

        function calculatePhysics(dt) {
            // Speed calculation
            if (order === 0) v_speed = k_rate;
            else if (order === 1) v_speed = k_rate * A_conc;
            else if (order === 2) v_speed = k_rate * A_conc * A_conc;

            let simDt = dt;
            let dA = -v_speed * simDt;
            A_conc += dA;
            B_conc += v_speed * simDt; // 1:1 stoichiometry
            t += simDt;

            if (A_conc <= 0.001) {
                A_conc = 0; B_conc = A0; v_speed = 0;
                isRunning = false;
                btnPlay.innerHTML = "⟳ Rejouer";
                btnPlay.classList.remove('btn-danger');
            }

            dataPoints.push({t: t, A: A_conc, B: B_conc});
        }

        let lastTime = 0;
        function loop(timestamp) {
            if (!isRunning) return;
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (dt > 0.1) dt = 0.1; // Limit lag

            calculatePhysics(dt);
            updateStats();
            drawAll();

            if (isRunning) requestAnimationFrame(loop);
        }

        updateUI();
        resize();
