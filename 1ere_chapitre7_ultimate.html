    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    margin-top: 24px;
}
.fc-card {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    height: 220px;
    perspective: 1000px;
    cursor: pointer;
}
.fc-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
}
.fc-card.flipped .fc-inner {
    transform: rotateY(180deg);
}
.fc-front, .fc-back {
    position: absolute;
    inset: 0;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.fc-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, rgba(var(--active-rgb), 0.1), rgba(0,0,0,0.4));
    border-color: rgba(var(--active-rgb), 0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(var(--active-rgb), 0.15);
}
.fc-front strong { font-size: 1.2rem; color: var(--ink); }
.fc-front p { font-size: 0.9rem; color: var(--muted); margin-top: 8px;}
.fc-back p { font-size: 1.1rem; color: var(--ink); font-weight: 500; }

/* Magnetic hover effect for cards */
.fc-card:hover .fc-inner {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 15px 35px rgba(var(--active-rgb), 0.15);
}
.fc-card.flipped:hover .fc-inner {
    transform: rotateY(180deg) translateY(-5px) scale(1.02);
}

/* --- 2. CHATBOT COPILOT UI --- */
.ai-card {

.ai-header-icon {

.chat-window {

    max-height: 400px;

}
.chat-msg {
    padding: 12px 18px;
    border-radius: 18px;

}
.msg-user {
    align-self: flex-end;

}
.msg-ai {

/* --- 3. SIMULATION/CANVAS UPGRADES --- */
.sim-card, .canvas-box, .titrage-grid {
    background: rgba(0,0,0,0.3) !important;
    border: 1px solid rgba(var(--active-rgb), 0.2) !important;

    overflow: hidden;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.3) !important;

@keyframes typing {

<script>

/* ═══ THEME ═══ */
(function(){const t=localStorage.getItem('pc_theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙'})();
function toggleTheme(){const h=document.documentElement,n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'☀️':'🌙';localStorage.setItem('pc_theme',n)}

/* ═══ TABS ═══ */
const visited=new Set(['cours']);
function switchTab(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));const panel=document.getElementById('p-'+id);if(panel)panel.classList.add('active');const tab=document.querySelector(`.tab[data-t="${id}"]`);if(tab)tab.classList.add('active');updateMastery(id)}
function updateMastery(id){visited.add(id);const pct=Math.round(visited.size/9*100);document.getElementById('masterBar').style.width=pct+'%';document.getElementById('pctLabel').textContent=pct+' %'}

/* ═══ HERO CANVAS ═══ */
const heroC=document.getElementById('heroCanvas'),heroCtx=heroC.getContext('2d');
const molecules=[
{name:'Éthanol',atoms:[{x:0.18,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.35,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.52,y:0.5,label:'O',col:'rgba(139,214,228,.8)'},{x:0.66,y:0.5,label:'H',col:'rgba(255,255,255,.6)'}],bonds:[[0,1],[1,2],[2,3]],group:'-OH'},
{name:'Propanone',atoms:[{x:0.15,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.32,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.49,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.32,y:0.3,label:'O',col:'rgba(139,214,228,.8)'}],bonds:[[0,1],[1,2],[1,3]],group:'C=O'},
{name:'Acide éthanoïque',atoms:[{x:0.18,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.36,y:0.5,label:'C',col:'rgba(240,163,186,.8)'},{x:0.53,y:0.5,label:'O',col:'rgba(139,214,228,.8)'},{x:0.36,y:0.3,label:'O',col:'rgba(139,214,228,.8)'}],bonds:[[0,1],[1,2],[1,3]],group:'-COOH'}
];
let molIdx=0;
function drawHero(){const W=heroC.width,H=heroC.height,t=performance.now()/1000;heroCtx.fillStyle='#0a0612';heroCtx.fillRect(0,0,W,H);
const grd=heroCtx.createRadialGradient(W/2,H/2,20,W/2,H/2,200);grd.addColorStop(0,'rgba(159,79,104,.12)');grd.addColorStop(1,'transparent');heroCtx.fillStyle=grd;heroCtx.fillRect(0,0,W,H);
const mol=molecules[Math.floor(t/4)%molecules.length];
mol.bonds.forEach(b=>{const a=mol.atoms[b[0]],c=mol.atoms[b[1]];heroCtx.strokeStyle='rgba(240,163,186,.35)';heroCtx.lineWidth=2;heroCtx.beginPath();heroCtx.moveTo(a.x*W,a.y*H);heroCtx.lineTo(c.x*W,c.y*H);heroCtx.stroke()});
mol.atoms.forEach((a,i)=>{const r=14+Math.sin(t*2+i)*2;heroCtx.beginPath();heroCtx.arc(a.x*W,a.y*H,r,0,Math.PI*2);heroCtx.fillStyle=a.col;heroCtx.fill();heroCtx.shadowColor=a.col;heroCtx.shadowBlur=18;heroCtx.fill();heroCtx.shadowBlur=0;heroCtx.font='bold 10px IBM Plex Mono';heroCtx.fillStyle='#0a0612';heroCtx.textAlign='center';heroCtx.fillText(a.label,a.x*W,a.y*H+4)});
heroCtx.font='bold 13px Inter';heroCtx.fillStyle='rgba(240,163,186,.7)';heroCtx.textAlign='center';heroCtx.fillText(mol.name,W/2,H-20);heroCtx.fillStyle='rgba(240,163,186,.4)';heroCtx.font='11px IBM Plex Mono';heroCtx.fillText('Groupe: '+mol.group,W/2,H-5);
requestAnimationFrame(drawHero)}
drawHero();

/* ═══ SIM FAMILLES ═══ */
const simC=document.getElementById('simCanvas'),simCtx=simC.getContext('2d');
const familles={
alcool:{name:'Alcool (-OH)',ex:'CH₃-CH₂-OH (éthanol)',color:'rgba(240,163,186,.8)',atoms:[{x:0.25,y:0.5,l:'C'},{x:0.42,y:0.5,l:'C'},{x:0.59,y:0.5,l:'O'},{x:0.73,y:0.5,l:'H'}],bonds:[[0,1,1],[1,2,1],[2,3,1]]},
aldehyde:{name:'Aldéhyde (-CHO)',ex:'CH₃-CHO (éthanal)',color:'rgba(241,179,117,.8)',atoms:[{x:0.25,y:0.5,l:'C'},{x:0.42,y:0.5,l:'C'},{x:0.59,y:0.35,l:'O'},{x:0.59,y:0.65,l:'H'}],bonds:[[0,1,1],[1,2,2],[1,3,1]]},
cetone:{name:'Cétone (C=O)',ex:'CH₃-CO-CH₃ (propanone)',color:'rgba(182,163,241,.8)',atoms:[{x:0.2,y:0.5,l:'C'},{x:0.38,y:0.5,l:'C'},{x:0.56,y:0.5,l:'C'},{x:0.38,y:0.3,l:'O'}],bonds:[[0,1,1],[1,2,1],[1,3,2]]},
acide:{name:'Acide carboxylique (-COOH)',ex:'CH₃-COOH (ac. éthanoïque)',color:'rgba(139,217,170,.8)',atoms:[{x:0.2,y:0.5,l:'C'},{x:0.38,y:0.5,l:'C'},{x:0.55,y:0.35,l:'O'},{x:0.55,y:0.65,l:'O'},{x:0.7,y:0.65,l:'H'}],bonds:[[0,1,1],[1,2,2],[1,3,1],[3,4,1]]},
ester:{name:'Ester (-COO-)',ex:'CH₃-COO-C₂H₅',color:'rgba(139,214,228,.8)',atoms:[{x:0.18,y:0.5,l:'C'},{x:0.35,y:0.5,l:'C'},{x:0.52,y:0.35,l:'O'},{x:0.52,y:0.65,l:'O'},{x:0.68,y:0.65,l:'C'}],bonds:[[0,1,1],[1,2,2],[1,3,1],[3,4,1]]}
};
function drawSim(){const f=familles[document.getElementById('familleSelect').value];document.getElementById('simInfo').textContent=f.ex;const W=simC.width,H=simC.height,t=performance.now()/1000;simCtx.fillStyle='#0a0612';simCtx.fillRect(0,0,W,H);
const grd=simCtx.createRadialGradient(W/2,H/2,10,W/2,H/2,220);grd.addColorStop(0,'rgba(159,79,104,.1)');grd.addColorStop(1,'transparent');simCtx.fillStyle=grd;simCtx.fillRect(0,0,W,H);
f.bonds.forEach(b=>{const a=f.atoms[b[0]],c=f.atoms[b[1]];if(b[2]===2){simCtx.strokeStyle=f.color.replace('.8','.5');simCtx.lineWidth=5;simCtx.beginPath();simCtx.moveTo(a.x*W-3,a.y*H-3);simCtx.lineTo(c.x*W-3,c.y*H-3);simCtx.stroke();simCtx.beginPath();simCtx.moveTo(a.x*W+3,a.y*H+3);simCtx.lineTo(c.x*W+3,c.y*H+3);simCtx.stroke();}
simCtx.strokeStyle=f.color.replace('.8','.4');simCtx.lineWidth=3;simCtx.beginPath();simCtx.moveTo(a.x*W,a.y*H);simCtx.lineTo(c.x*W,c.y*H);simCtx.stroke()});
f.atoms.forEach((a,i)=>{const r=16+Math.sin(t*2+i)*2;simCtx.beginPath();simCtx.arc(a.x*W,a.y*H,r,0,Math.PI*2);simCtx.fillStyle=f.color;simCtx.fill();simCtx.shadowColor=f.color;simCtx.shadowBlur=20;simCtx.fill();simCtx.shadowBlur=0;simCtx.font='bold 11px IBM Plex Mono';simCtx.fillStyle='#0a0612';simCtx.textAlign='center';simCtx.fillText(a.l,a.x*W,a.y*H+4)});
simCtx.font='bold 14px Inter';simCtx.fillStyle=f.color;simCtx.textAlign='center';simCtx.fillText(f.name,W/2,H-15);
requestAnimationFrame(drawSim)}
drawSim();

/* ═══ IR CANVAS ═══ */
const irC=document.getElementById('irCanvas'),irCtx=irC.getContext('2d');
const irData={
ethanol:{name:'Éthanol CH₃CH₂OH',bands:[{nu:3300,h:0.82,w:120,label:'O–H alcool',col:'rgba(240,163,186,.9)'},{nu:2930,h:0.55,w:60,label:'C–H',col:'rgba(241,179,117,.7)'},{nu:1050,h:0.65,w:50,label:'C–O',col:'rgba(139,217,170,.7)'}]},
acide:{name:'Acide éthanoïque CH₃COOH',bands:[{nu:2900,h:0.75,w:280,label:'O–H acide',col:'rgba(240,163,186,.9)'},{nu:2930,h:0.45,w:50,label:'C–H',col:'rgba(241,179,117,.7)'},{nu:1710,h:0.88,w:50,label:'C=O',col:'rgba(182,163,241,.9)'}]},
propanone:{name:'Propanone CH₃COCH₃',bands:[{nu:1715,h:0.90,w:50,label:'C=O',col:'rgba(182,163,241,.9)'},{nu:2920,h:0.50,w:55,label:'C–H',col:'rgba(241,179,117,.7)'}]},
ester:{name:'Éthanoate d\'éthyle',bands:[{nu:1735,h:0.92,w:50,label:'C=O ester',col:'rgba(182,163,241,.9)'},{nu:2930,h:0.48,w:55,label:'C–H',col:'rgba(241,179,117,.7)'},{nu:1240,h:0.70,w:60,label:'C–O–C',col:'rgba(139,214,228,.7)'},{nu:1050,h:0.60,w:45,label:'C–O',col:'rgba(139,214,228,.6)'}]}
};
function drawIR(){const d=irData[document.getElementById('irSelect').value];const W=irC.width,H=irC.height;irCtx.fillStyle='#0a0612';irCtx.fillRect(0,0,W,H);
const pad={l:50,r:30,t:30,b:50};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
irCtx.strokeStyle='rgba(240,163,186,.2)';irCtx.lineWidth=1;
for(let nu=500;nu<=4000;nu+=500){const x=pad.l+((4000-nu)/3500)*gW;irCtx.beginPath();irCtx.moveTo(x,pad.t);irCtx.lineTo(x,pad.t+gH);irCtx.stroke();irCtx.font='10px IBM Plex Mono';irCtx.fillStyle='rgba(240,163,186,.4)';irCtx.textAlign='center';irCtx.fillText(nu,x,H-10)}
irCtx.font='10px IBM Plex Mono';irCtx.fillStyle='rgba(240,163,186,.4)';irCtx.textAlign='right';irCtx.fillText('T%',pad.l-5,pad.t+5);
irCtx.strokeStyle='rgba(240,163,186,.15)';irCtx.beginPath();irCtx.moveTo(pad.l,pad.t+gH);irCtx.lineTo(pad.l+gW,pad.t+gH);irCtx.stroke();
const baseline=new Float32Array(W);baseline.fill(0.08);
d.bands.forEach(b=>{const cx=pad.l+((4000-b.nu)/3500)*gW;for(let i=0;i<gW;i++){const x=i,nuX=4000-(x/gW)*3500,dist=(nuX-b.nu)/b.w;baseline[i]+=b.h*Math.exp(-dist*dist)}});
irCtx.strokeStyle='rgba(240,163,186,.8)';irCtx.lineWidth=2;irCtx.beginPath();for(let i=0;i<gW;i++){const y=pad.t+gH*(1-Math.min(0.95,baseline[i]));if(i===0)irCtx.moveTo(pad.l+i,y);else irCtx.lineTo(pad.l+i,y)}irCtx.stroke();
d.bands.forEach(b=>{const cx=pad.l+((4000-b.nu)/3500)*gW;const cy=pad.t+gH*(1-b.h);irCtx.strokeStyle=b.col;irCtx.lineWidth=1;irCtx.setLineDash([3,3]);irCtx.beginPath();irCtx.moveTo(cx,cy);irCtx.lineTo(cx,pad.t+gH);irCtx.stroke();irCtx.setLineDash([]);
irCtx.font='bold 9px Inter';irCtx.fillStyle=b.col;irCtx.textAlign='center';irCtx.fillText(b.label,cx,cy-5);irCtx.fillText(b.nu+' cm⁻¹',cx,cy-16)});
irCtx.font='bold 12px Inter';irCtx.fillStyle='rgba(240,163,186,.6)';irCtx.textAlign='center';irCtx.fillText(d.name,W/2,20)}
drawIR();

/* ═══ FLASHCARDS ═══ */
const FC_DATA=[
{q:"Valence du carbone ?",a:"4 liaisons covalentes. Peut former C–C simples, C=C doubles, C≡C triples. Tétravalent."},
{q:"Règle de la formule topologique ?",a:"Sommet (angle, extrémité) = 1 carbone. H liés aux C : implicites. Hétéroatomes (O, N...) et leurs H : écrits explicitement."},
{q:"Groupe –OH → famille ?",a:"Alcool (suffixe –ol). Ex : éthanol CH₃CH₂OH. Bande IR O–H large à 3200–3400 cm⁻¹."},
{q:"Groupe –CHO → famille ?",a:"Aldéhyde (suffixe –al). Carbonyle en bout de chaîne. Ex : éthanal CH₃CHO. IR : C=O vers 1720 cm⁻¹."},
{q:"Groupe C=O central → famille ?",a:"Cétone (suffixe –one). Ex : propanone CH₃COCH₃. Différence avec aldéhyde : C=O entre deux C."},
{q:"Groupe –COOH → famille ?",a:"Acide carboxylique (acide…–oïque). Contient C=O + O–H. Ex : CH₃COOH. IR : bande O–H très large 2500–3300 + C=O 1710."},
{q:"Groupe –COO– → famille ?",a:"Ester (…–oate de …–yle). Résulte d'estérification acide + alcool. IR : C=O ~1735, deux bandes C–O."},
{q:"Bande IR O–H alcool ?",a:"Large et intense entre 3200 et 3400 cm⁻¹. Largeur due aux liaisons hydrogène intermoléculaires."},
{q:"Bande IR C=O carbonyle ?",a:"Fine et très intense entre 1700 et 1750 cm⁻¹. Présente dans aldéhydes, cétones, acides, esters."},
{q:"Bande IR O–H acide carboxylique ?",a:"Très large entre 2500 et 3300 cm⁻¹. Plus large et plus basse que O–H alcool. Combinée avec C=O → acide."},
{q:"Isomères de constitution ?",a:"Même formule brute, enchaînements différents. Ex : éthanol et diméthyléther ont C₂H₆O. Propriétés très différentes."},
{q:"Formule générale des alcanes ?",a:"CₙH₂ₙ₊₂. Ex : propane (n=3) → C₃H₈. Chaîne saturée acyclique."},
{q:"Différence aldéhyde/cétone ?",a:"Aldéhyde : C=O en bout de chaîne (–CHO). Cétone : C=O au milieu de la chaîne (R–CO–R'). Même bande C=O en IR."},
{q:"Comment identifier un acide carboxylique par IR ?",a:"Présence de DEUX bandes : C=O fine (~1710 cm⁻¹) ET O–H très large (2500–3300 cm⁻¹). Les deux ensemble = acide."},
{q:"Degré d'insaturation I pour C₆H₆ (benzène) ?",a:"I = (2×6+2–6)/2 = 4. Cycle aromatique = 3 doubles liaisons + 1 cycle → I=4."}
];
let fcOrder=[...Array(FC_DATA.length).keys()];
function renderFC(){const g=document.getElementById('fcGrid');g.innerHTML=fcOrder.map(i=>{const c=FC_DATA[i];return`<div class="flashcard" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner"><div class="flash-front"><b>${c.q}</b></div><div class="flash-back">${c.a}</div></div></div>`}).join('')}
function shuffleFC(){for(let i=fcOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcOrder[i],fcOrder[j]]=[fcOrder[j],fcOrder[i]]}renderFC()}
renderFC();

/* ═══ QUIZ ═══ */
const QUIZ=[
{q:"Le carbone est :",o:["Tétravalent (forme 4 liaisons)","Divalent (forme 2 liaisons)","Monovalent","Trivalent"],c:0,e:"Le carbone forme toujours exactement 4 liaisons covalentes (tétravalent)."},
{q:"La formule brute C₂H₆O correspond à :",o:["Deux isomères possibles (éthanol et diméthyléther)","Une seule molécule","Trois isomères","Un acide carboxylique"],c:0,e:"C₂H₆O correspond à l'éthanol (CH₃CH₂OH) et au diméthyléther (CH₃OCH₃) : deux isomères de constitution."},
{q:"Le groupe –OH dans une molécule organique désigne :",o:["Un alcool (groupe hydroxyle)","Un acide carboxylique","Un aldéhyde","Un ester"],c:0,e:"–OH (hydroxyle) = alcool. Attention : dans –COOH, le OH est aussi présent mais c'est un acide carboxylique."},
{q:"Quelle bande IR caractérise un groupe C=O carbonyle ?",o:["1700–1750 cm⁻¹ (fine et intense)","3200–3400 cm⁻¹ (large)","2800–3000 cm⁻¹","500–1500 cm⁻¹"],c:0,e:"C=O : fine et intense entre 1700 et 1750 cm⁻¹. C'est la bande la plus caractéristique en chimie organique."},
{q:"Un spectre IR montre une bande large à 3300 cm⁻¹ et AUCUNE bande à 1700–1750 cm⁻¹. La molécule est :",o:["Un alcool","Un acide carboxylique","Un aldéhyde ou cétone","Un ester"],c:0,e:"Bande O–H large (alcool) sans C=O → alcool confirmé. Un acide aurait aussi une bande C=O à 1710 cm⁻¹."},
{q:"La différence entre un aldéhyde et une cétone est :",o:["Position du C=O : terminal (aldéhyde) vs central (cétone)","La présence ou non de O","La longueur de chaîne","La présence de N"],c:0,e:"Aldéhyde : C=O en bout de chaîne (–CHO). Cétone : C=O entre deux carbones. Même bande IR vers 1700–1750."},
{q:"Dans une formule topologique, que représente chaque sommet ?",o:["Un atome de carbone","Un atome d'hydrogène","Un hétéroatome","Une liaison double"],c:0,e:"Chaque angle ou extrémité = 1 carbone. Les H sur les C sont implicites (calculés par tétravalence)."},
{q:"La formule générale des alcanes est :",o:["CₙH₂ₙ₊₂","CₙH₂ₙ","CₙHₙ","CₙH₂ₙ₋₂"],c:0,e:"Alcane = chaîne saturée acyclique → CₙH₂ₙ₊₂. Ex : propane C₃H₈ = C₃H₂×₃₊₂ ✓"},
{q:"L'acide éthanoïque se reconnaît en IR par :",o:["Bande O–H très large (2500–3300) + bande C=O (~1710)","Bande O–H à 3200–3400 sans C=O","Bande N–H à 3300","Seule bande C=O"],c:0,e:"L'acide carboxylique possède DEUX bandes caractéristiques : O–H très large et C=O fine. La combinaison des deux = acide."},
{q:"Éthanol (T_éb=78°C) vs diméthyléther (T_éb=-24°C) : pourquoi cette différence malgré C₂H₆O ?",o:["Éthanol forme des liaisons H (O–H), pas le diméthyléther","Éthanol est plus lourd","Diméthyléther est ionique","Mêmes interactions"],c:0,e:"L'éthanol possède un O–H → liaisons H entre molécules → cohésion forte → T_éb élevée. Le diméthyléther n'a que VdW."},
{q:"Le degré d'insaturation I=1 dans une molécule CₙHₘO signifie :",o:["1 double liaison ou 1 cycle","2 doubles liaisons","1 cycle benzénique","Pas d'insaturation"],c:0,e:"I=1 → une seule insaturation : soit 1 double liaison (C=C ou C=O), soit 1 cycle. I=4 = benzène."},
{q:"Dans la nomenclature IUPAC, quel est le nom du CH₃CH₂CH₂OH ?",o:["Propan-1-ol","Propan-2-ol","Éthanol","Méthanol"],c:0,e:"3 carbones (propane) + alcool (–ol) + –OH en position 1 → propan-1-ol."}
];
let qIdx=0,qScore=0;
function startQuiz(){qIdx=0;qScore=0;document.getElementById('quizEnd').style.display='none';document.getElementById('quizBox').style.display='block';renderQ()}
function renderQ(){if(qIdx>=QUIZ.length){document.getElementById('quizBox').style.display='none';document.getElementById('quizEnd').style.display='block';document.getElementById('quizFinal').textContent=qScore+'/'+QUIZ.length+' — '+Math.round(qScore/QUIZ.length*100)+'%';return}const q=QUIZ[qIdx];document.getElementById('quizScore').textContent='Question '+(qIdx+1)+' / '+QUIZ.length;document.getElementById('quizBox').innerHTML='<p style="font-weight:700;margin-bottom:12px">'+q.q+'</p>'+q.o.map((o,i)=>'<button class="option" onclick="answerQ('+i+')">'+o+'</button>').join('')+'<div id="quizExpl" style="display:none;margin-top:12px;padding:12px;border-radius:12px;background:var(--panel2);color:var(--muted);font-size:13px;line-height:1.7"></div>'}
function answerQ(i){const q=QUIZ[qIdx];const btns=document.querySelectorAll('.option');btns.forEach((b,j)=>{b.disabled=true;if(j===q.c)b.classList.add('correct');if(j===i&&i!==q.c)b.classList.add('wrong')});if(i===q.c)qScore++;const expl=document.getElementById('quizExpl');expl.style.display='block';expl.innerHTML='<strong>💡</strong> '+q.e;setTimeout(()=>{qIdx++;renderQ()},2200)}
startQuiz();


// 2026 Ultimate Aesthetics (Canvas)
const canvas=document.getElementById('starfield');
if(canvas){
    const ctx=canvas.getContext('2d');
    let w=canvas.width=window.innerWidth;
    let h=canvas.height=window.innerHeight;
    const stars=Array.from({length:250},()=>({x:Math.random()*w,y:Math.random()*h,s:Math.random()*1.5,a:Math.random()}));
    function draw(){
      ctx.clearRect(0,0,w,h);
      stars.forEach(st=>{
        st.a+=0.02;
        ctx.fillStyle=`rgba(255,255,255,${Math.abs(Math.sin(st.a))*0.5+0.1})`;
        ctx.beginPath(); ctx.arc(st.x,st.y,st.s,0,Math.PI*2); ctx.fill();
        st.y-=0.2; if(st.y<0) st.y=h;
      });
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize',()=>{w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;});
}

// Ensure tab switching updates the 2026 sidebar
const originalSwitchTab = window.switchTab;
if (typeof originalSwitchTab === 'function') {
    window.switchTab = function(tabId) {
        originalSwitchTab(tabId);
        document.querySelectorAll('.tablist .tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tablist .tab[data-tab="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');
    };
} else {
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tablist .tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tablist .tab[data-tab="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');

        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const targetPanel = document.getElementById('tab-' + tabId);
        if(targetPanel) targetPanel.classList.add('active');
    }
}

document.querySelectorAll('.tablist .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (typeof window.switchTab === 'function') {
        window.switchTab(btn.dataset.tab);
    }
  });
});
