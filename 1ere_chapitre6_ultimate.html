/* ═══ HERO CANVAS ═══ */
const heroC=document.getElementById('heroCanvas'),heroCtx=heroC.getContext('2d');
function drawHero(){const W=heroC.width,H=heroC.height,t=performance.now()/1000;heroCtx.fillStyle='#0a0612';heroCtx.fillRect(0,0,W,H);
const grd=heroCtx.createRadialGradient(W/2,H/2,20,W/2,H/2,200);grd.addColorStop(0,'rgba(159,79,104,.12)');grd.addColorStop(1,'transparent');heroCtx.fillStyle=grd;heroCtx.fillRect(0,0,W,H);
const cx=W*0.3,cy=H*0.5;
heroCtx.strokeStyle='rgba(240,163,186,.25)';heroCtx.lineWidth=1;
for(let i=0;i<4;i++){for(let j=0;j<4;j++){const x=cx-45+i*30,y=cy-45+j*30;const charge=(i+j)%2===0;heroCtx.beginPath();heroCtx.arc(x,y,8+Math.sin(t*2+i+j)*1.5,0,Math.PI*2);heroCtx.fillStyle=charge?'rgba(240,163,186,.7)':'rgba(139,214,228,.7)';heroCtx.fill();heroCtx.font='bold 8px IBM Plex Mono';heroCtx.fillStyle=charge?'#f0a3ba':'#8bd6e4';heroCtx.textAlign='center';heroCtx.fillText(charge?'Na⁺':'Cl⁻',x,y+3);if(i<3){heroCtx.beginPath();heroCtx.moveTo(x+10,y);heroCtx.lineTo(x+20,y);heroCtx.stroke()}if(j<3){heroCtx.beginPath();heroCtx.moveTo(x,y+10);heroCtx.lineTo(x,y+20);heroCtx.stroke()}}}
heroCtx.font='bold 11px Inter';heroCtx.fillStyle='rgba(240,163,186,.6)';heroCtx.textAlign='center';heroCtx.fillText('Réseau NaCl',cx,cy+65);
const ax=W*0.7,ay=H*0.5;
for(let i=0;i<5;i++){const angle=t*0.8+i*Math.PI*2/5,r=35+Math.sin(t*1.5+i)*8;const ix=ax+Math.cos(angle)*r,iy=ay+Math.sin(angle)*r;
heroCtx.beginPath();heroCtx.arc(ix,iy,6,0,Math.PI*2);heroCtx.fillStyle='rgba(240,163,186,.6)';heroCtx.fill();
for(let w=0;w<3;w++){const wa=angle+Math.PI+w*0.6-0.6,wr=14+w*3;const wx=ix+Math.cos(wa)*wr,wy=iy+Math.sin(wa)*wr;heroCtx.beginPath();heroCtx.arc(wx,wy,3,0,Math.PI*2);heroCtx.fillStyle='rgba(139,214,228,.35)';heroCtx.fill()}}
heroCtx.fillStyle='rgba(240,163,186,.6)';heroCtx.fillText('Ions hydratés',ax,ay+65);
const arrowX=W*0.5,arrowY=H*0.5;heroCtx.strokeStyle='rgba(240,163,186,.4)';heroCtx.lineWidth=2;heroCtx.beginPath();heroCtx.moveTo(arrowX-20,arrowY);heroCtx.lineTo(arrowX+20,arrowY);heroCtx.lineTo(arrowX+14,arrowY-6);heroCtx.moveTo(arrowX+20,arrowY);heroCtx.lineTo(arrowX+14,arrowY+6);heroCtx.stroke();heroCtx.font='bold 10px Inter';heroCtx.fillStyle='rgba(240,163,186,.5)';heroCtx.fillText('H₂O',arrowX,arrowY-12);
requestAnimationFrame(drawHero)}
drawHero();

/* ═══ FLASHCARDS ═══ */
const FC_DATA=[
{q:"Cohésion d'un solide ionique ?",a:"Interactions électrostatiques entre cations (+) et anions (−) en réseau cristallin. Très fortes → T_f élevée. Ex : NaCl 801°C."},
{q:"Cohésion d'un solide moléculaire ?",a:"Van der Waals et/ou liaisons hydrogène entre molécules. Plus faibles → T_f basse. Ex : glace 0°C, benzène 5,5°C."},
{q:"Liaison hydrogène — conditions ?",a:"H lié à O, N ou F + doublet non liant d'un autre atome électronégatif (O, N ou F). ≈ 10 à 40 kJ/mol, 10× plus forte que VdW."},
{q:"3 étapes de la dissolution de NaCl ?",a:"① Dissociation (rupture réseau cristallin). ② Solvatation (eau entoure les ions). ③ Dispersion (répartition uniforme)."},
{q:"Équation de dissolution de NaCl ?",a:"NaCl(s) → Na⁺(aq) + Cl⁻(aq). Les ions sont hydratés (entourés de molécules d'eau)."},
{q:"Définition de la solubilité s ?",a:"Masse maximale de soluté dissous dans 1 L de solution à T donnée. Unité : g·L⁻¹. s = m_max / V."},
{q:"Qu'est-ce qu'une solution saturée ?",a:"Solution où c = s (concentration maximale atteinte). Au-delà, le soluté ne se dissout plus → dépôt solide (corps de fond)."},
{q:"Principe 'similibus similibus' ?",a:"Le semblable dissout le semblable : solvant polaire → solutés polaires/ioniques. Solvant apolaire → solutés apolaires."},
{q:"Extraction L-L — conditions ?",a:"Solvant extracteur non miscible à l'eau, dans lequel le soluté est plus soluble. Utilise une ampoule à décanter."},
{q:"Pourquoi l'eau dissout NaCl mais pas I₂ ?",a:"Eau polaire → interaction ion-dipôle avec Na⁺ et Cl⁻ → solvatation efficace. I₂ apolaire → pas d'interaction avec l'eau."},
{q:"I₂ dans eau/cyclohexane : quel solvant ?",a:"I₂ apolaire → migre vers cyclohexane (apolaire). Phase supérieure (ρ=0,78 < 1) → violette. Phase inférieure (eau) → décolorée."},
{q:"NaCl 360 g/L : 50 g dans 100 mL ?",a:"m_max = 360 × 0,1 = 36 g. Or 50 > 36 → impossible. Seuls 36 g se dissolvent, reste 14 g de dépôt."},
{q:"Van der Waals — dans quelles molécules ?",a:"TOUTES les molécules (polaires ET apolaires). Interaction la plus faible (0,1 à 2 kJ/mol). Due aux dipôles instantanés."},
{q:"Pourquoi H₂O (0°C) >> CH₄ (−182°C) en T_f ?",a:"H₂O forme des liaisons H (O—H···O). CH₄ n'a que VdW (C pas assez électronégatif). Liaisons H >> VdW en intensité."},
{q:"Coefficient de partage K ?",a:"K = C_org / C_aq. Si K > 1 : soluté plus soluble dans la phase organique → extraction efficace."}
];
let fcOrder=[...Array(FC_DATA.length).keys()];
function renderFC(){const g=document.getElementById('fcGrid');g.innerHTML=fcOrder.map(i=>{const c=FC_DATA[i];return`<div class="flashcard" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner"><div class="flash-front"><b>${c.q}</b></div><div class="flash-back">${c.a}</div></div></div>`}).join('')}
function shuffleFC(){for(let i=fcOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcOrder[i],fcOrder[j]]=[fcOrder[j],fcOrder[i]]}renderFC()}
renderFC();

/* ═══ QUIZ ═══ */
const QUIZ=[
{q:"La cohésion d'un solide ionique est assurée par :",o:["Des interactions électrostatiques entre cations et anions","Des liaisons hydrogène","Des interactions de Van der Waals","Des liaisons covalentes"],c:0,e:"Solide ionique = réseau de cations⁺ et anions⁻ liés par attraction électrostatique coulombienne. Très fortes → T_f élevée."},
{q:"La liaison hydrogène se forme entre :",o:["H lié à O/N/F et un doublet non liant d'un atome électronégatif","Deux atomes de carbone","Deux ions de charges opposées","Deux métaux"],c:0,e:"La liaison H nécessite H lié à un atome très électronégatif (O, N, F) et un doublet non liant voisin."},
{q:"Pourquoi NaCl (801°C) fond bien au-dessus de la glace (0°C) ?",o:["Les interactions ioniques sont bien plus fortes que les liaisons H","Les deux ont les mêmes interactions","NaCl est plus lourd","La glace contient moins d'atomes"],c:0,e:"Interactions ioniques >> liaisons H >> VdW. Plus l'interaction est forte, plus T_f est élevée."},
{q:"Les 3 étapes de dissolution de NaCl dans l'eau sont :",o:["Dissociation → Solvatation → Dispersion","Fusion → Mélange → Dilution","Évaporation → Condensation → Précipitation","Ionisation → Neutralisation → Filtration"],c:0,e:"① Rupture du réseau cristallin ② Eau entoure les ions (hydratation) ③ Répartition uniforme."},
{q:"s(NaCl) = 360 g/L. Peut-on dissoudre 50 g dans 100 mL ?",o:["Non : m_max = 36 g, donc 50 g > 36 g","Oui sans problème","Oui car 50 < 360","Non car NaCl est insoluble"],c:0,e:"m_max = 360 × 0,1 = 36 g. 50 > 36 → impossible, dépôt de 14 g."},
{q:"Le principe 'similibus similibus' signifie :",o:["Le semblable dissout le semblable (polaire↔polaire, apolaire↔apolaire)","Tous les solutés se dissolvent dans tous les solvants","Seuls les solides ioniques sont solubles","L'eau dissout tout"],c:0,e:"Solvant polaire (eau) dissout ioniques/polaires. Solvant apolaire dissout apolaires."},
{q:"Pour une extraction L-L, le solvant extracteur doit être :",o:["Non miscible à l'eau et meilleur solvant pour le soluté","Miscible à l'eau","De même densité que l'eau","Le même que le solvant initial"],c:0,e:"Deux phases distinctes nécessaires + soluté plus soluble dans le solvant extracteur."},
{q:"Cyclohexane (ρ=0,78) mélangé à l'eau : quelle phase est au-dessus ?",o:["Le cyclohexane (moins dense)","L'eau","Ils sont mélangés","Le cyclohexane est en dessous"],c:0,e:"ρ_cyclo = 0,78 < ρ_eau = 1,00 → cyclohexane moins dense → phase supérieure."},
{q:"I₂ (apolaire) dans un mélange eau/cyclohexane migre vers :",o:["Le cyclohexane (apolaire → similibus)","L'eau","Aucun des deux","Les deux également"],c:0,e:"I₂ apolaire → plus soluble dans cyclohexane (apolaire). Phase supérieure violette."},
{q:"Van der Waals existe entre :",o:["Toutes les molécules (polaires et apolaires)","Seulement les molécules apolaires","Seulement les ions","Seulement H₂O"],c:0,e:"VdW existe entre TOUTES les molécules. C'est l'interaction la plus faible et la plus universelle."},
{q:"Pourquoi H₂O a une T_éb (100°C) bien supérieure à CH₄ (−161°C) malgré M voisines ?",o:["H₂O forme des liaisons H, pas CH₄","H₂O est plus lourde","CH₄ est un gaz noble","Les deux ont les mêmes interactions"],c:0,e:"H₂O : liaisons H (O—H···O) très fortes. CH₄ : VdW uniquement (C pas assez électronégatif pour liaison H)."},
{q:"Le coefficient de partage K = C_org/C_aq = 9. Cela signifie :",o:["Le soluté est 9× plus concentré dans la phase organique","Le soluté est 9× plus concentré dans l'eau","L'extraction est inefficace","K n'a pas d'unité mais n'indique rien"],c:0,e:"K > 1 → soluté majoritairement dans la phase organique → extraction efficace."}
];
let qIdx=0,qScore=0;
function startQuiz(){qIdx=0;qScore=0;document.getElementById('quizEnd').style.display='none';document.getElementById('quizBox').style.display='block';renderQ()}

startQuiz();

/* ═══ SIM DISSOLUTION ═══ */
const simC=document.getElementById('simCanvas'),simCtx=simC.getContext('2d');
let simAnim;
function drawSim(){cancelAnimationFrame(simAnim);const W=simC.width,H=simC.height;const n=parseInt(document.getElementById('simN').value);const step=parseInt(document.getElementById('simStep').value);
const ions=[];
if(step===1){for(let i=0;i<n;i++)for(let j=0;j<n;j++){const x=W/2-n*18+i*36,y=H/2-n*18+j*36;ions.push({x,y,charge:(i+j)%2===0,vx:0,vy:0})}}
else{for(let i=0;i<n*2;i++){const angle=Math.random()*Math.PI*2,r=step===2?40+Math.random()*60:30+Math.random()*140;ions.push({x:W/2+Math.cos(angle)*r,y:H/2+Math.sin(angle)*r,charge:i%2===0,vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8})}}
function frame(){const t=performance.now()/1000;simCtx.fillStyle='#0a0612';simCtx.fillRect(0,0,W,H);
const grd=simCtx.createRadialGradient(W/2,H/2,20,W/2,H/2,250);grd.addColorStop(0,'rgba(159,79,104,.08)');grd.addColorStop(1,'transparent');simCtx.fillStyle=grd;simCtx.fillRect(0,0,W,H);
if(step>=2){for(let i=0;i<20;i++){const wx=W*0.1+Math.random()*W*0.8,wy=H*0.1+Math.random()*H*0.8;simCtx.beginPath();simCtx.arc(wx+Math.sin(t*2+i)*3,wy+Math.cos(t*1.5+i)*3,2.5,0,Math.PI*2);simCtx.fillStyle='rgba(139,214,228,.15)';simCtx.fill()}}
const speed=parseInt(document.getElementById('simSpeed').value)*0.3;ions.forEach((ion,idx)=>{if(step>=2){ion.x+=ion.vx*speed;ion.y+=ion.vy*speed;if(ion.x<30||ion.x>W-30)ion.vx*=-1;if(ion.y<30||ion.y>H-30)ion.vy*=-1}
simCtx.beginPath();simCtx.arc(ion.x,ion.y,10+Math.sin(t*3+idx)*1.5,0,Math.PI*2);const col=ion.charge?'rgba(240,163,186,':'rgba(139,214,228,';simCtx.fillStyle=col+'0.7)';simCtx.fill();simCtx.shadowColor=col+'0.4)';simCtx.shadowBlur=12;simCtx.fill();simCtx.shadowBlur=0;
simCtx.font='bold 9px IBM Plex Mono';simCtx.fillStyle=ion.charge?'#f0a3ba':'#8bd6e4';simCtx.textAlign='center';simCtx.fillText(ion.charge?'Na⁺':'Cl⁻',ion.x,ion.y+3);
if(step===2){for(let w=0;w<3;w++){const wa=t+idx+w*2.1,wr=16+w*4;simCtx.beginPath();simCtx.arc(ion.x+Math.cos(wa)*wr,ion.y+Math.sin(wa)*wr,3,0,Math.PI*2);simCtx.fillStyle='rgba(139,214,228,.3)';simCtx.fill()}}});
const labels=['','① Cristal intact','② Solvatation','③ Dispersion'];simCtx.font='bold 14px Inter';simCtx.fillStyle='rgba(240,163,186,.6)';simCtx.textAlign='center';simCtx.fillText(labels[step],W/2,H-20);
simAnim=requestAnimationFrame(frame)}frame()}
drawSim();

/* ═══ CALCULATEUR SOLUBILITÉ ═══ */
const solC=document.getElementById('solCanvas'),solCtx=solC.getContext('2d');
function calcSol(){const W=solC.width,H=solC.height;const s=parseFloat(document.getElementById('solS').value)||360;const Vml=parseFloat(document.getElementById('solV').value)||250;const m=parseFloat(document.getElementById('solM').value)||100;const V=Vml/1000;const mmax=s*V;const dissolved=Math.min(m,mmax);const reste=Math.max(0,m-mmax);const saturated=m>=mmax;
solCtx.fillStyle='#0a0612';solCtx.fillRect(0,0,W,H);
const bx=W/2-60,by=40,bw=120,bh=180;
solCtx.strokeStyle='rgba(240,163,186,.3)';solCtx.lineWidth=2;solCtx.strokeRect(bx,by,bw,bh);
const fillH=Math.min(bh*0.85,bh*dissolved/mmax*0.85);const fillY=by+bh-fillH;const blue=saturated?'rgba(240,163,186,.25)':'rgba(139,214,228,.2)';solCtx.fillStyle=blue;solCtx.fillRect(bx+2,fillY,bw-4,fillH);
if(reste>0){const depH=Math.min(20,reste/m*40);solCtx.fillStyle='rgba(240,163,186,.5)';solCtx.fillRect(bx+10,by+bh-depH,bw-20,depH-2)}
solCtx.font='bold 12px IBM Plex Mono';solCtx.fillStyle='#f0a3ba';solCtx.textAlign='center';solCtx.fillText(saturated?'SATURÉE':'NON SATURÉE',W/2,by+bh+25);
const res=document.getElementById('solResult');res.innerHTML=`m<sub>max</sub> = s × V = ${s} × ${V.toFixed(3)} = <strong>${mmax.toFixed(1)} g</strong><br>`+(saturated?`m = ${m} g > ${mmax.toFixed(1)} g → <strong>Solution saturée</strong>. Dépôt : <strong>${reste.toFixed(1)} g</strong>`:`m = ${m} g ≤ ${mmax.toFixed(1)} g → <strong>Tout est dissous</strong>. Pas de dépôt.`)}
calcSol();

// 2026 Ultimate Aesthetics (Canvas)
const canvas=document.getElementById('starfield');
if(canvas){
    const ctx=canvas.getContext('2d');
    let w=canvas.width=window.innerWidth;
    let h=canvas.height=window.innerHeight;
    const stars=Array.from({length:250},()=>({x:Math.random()*w,y:Math.random()*h,s:Math.random()*1.5,a:Math.random()}));
    function draw(){
      ctx.clearRect(0,0,w,h);
      stars.forEach(st=>{
        st.a+=0.02;
        ctx.fillStyle=`rgba(255,255,255,${Math.abs(Math.sin(st.a))*0.5+0.1})`;
        ctx.beginPath(); ctx.arc(st.x,st.y,st.s,0,Math.PI*2); ctx.fill();
        st.y-=0.2; if(st.y<0) st.y=h;
      });
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize',()=>{w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;});
}

// Ensure tab switching updates the 2026 sidebar
const originalSwitchTab = window.switchTab;
if (typeof originalSwitchTab === 'function') {
    window.switchTab = function(tabId) {
        originalSwitchTab(tabId);
        document.querySelectorAll('.tablist .tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tablist .tab[data-tab="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');
    };
} else {
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tablist .tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tablist .tab[data-tab="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');

        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const targetPanel = document.getElementById('tab-' + tabId);
        if(targetPanel) targetPanel.classList.add('active');
    }
}

document.querySelectorAll('.tablist .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (typeof window.switchTab === 'function') {
        window.switchTab(btn.dataset.tab);
    }
  });
});
